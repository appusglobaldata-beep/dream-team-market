<!DOCTYPE html>
<html>
<head>

<title>Customer Dashboard - Dream Team Market</title>

<script src="https://js.paystack.co/v1/inline.js"></script>

<style>

body{
    font-family:Arial;
    background:#f5f5f5;
    margin:0;
}

header{
    background:#008000;
    color:white;
    padding:20px;
    text-align:center;
}

.box{
    background:white;
    margin:20px;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px #ccc;
}

.product{
    border:1px solid #ddd;
    padding:15px;
    margin:10px 0;
    border-radius:5px;
}

button{
    background:#008000;
    color:white;
    border:none;
    padding:12px 20px;
    border-radius:5px;
    cursor:pointer;
}

</style>

</head>


<body>


<header>

<h1>Customer Dashboard</h1>

<p>Dream Team Market</p>

</header>



<div class="box">

<h2>Available Products</h2>


<div class="product">

<h3>Sample Product</h3>

<p>Price: ₦1000</p>


<button onclick="payWithPaystack()">
Buy Now
</button>


</div>


</div>




<script>

function payWithPaystack(){


let handler = PaystackPop.setup({

key: 'pk_test_e5155a948fb02b41f36d131f41e7d19a22b9ed22',

email: 'customer@email.com',

amount: 100000,

currency: 'NGN',


callback: function(response){

alert("Payment Successful. Reference: " + response.reference);

},


onClose: function(){

alert("Payment cancelled");

}


});


handler.openIframe();


}

</script>



</body>

</html>
