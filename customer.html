<!DOCTYPE html>
<html>
<head>

<title>Customer Dashboard - Dream Team Market</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f5f5f5;
}

.header{
background:#0b8f3c;
color:white;
padding:20px;
font-size:25px;
}

.container{
padding:20px;
}

.card{
background:white;
padding:20px;
margin:15px 0;
border-radius:10px;
box-shadow:0 2px 8px #ccc;
}

button{
background:#0b8f3c;
color:white;
border:0;
padding:12px;
border-radius:5px;
}

.product{
display:inline-block;
background:white;
width:200px;
padding:15px;
margin:10px;
border-radius:10px;
box-shadow:0 2px 8px #ccc;
}

</style>

</head>


<body>


<div class="header">
Dream Team Market - Customer Dashboard
</div>


<div class="container">


<h2>Welcome Customer</h2>


<div class="card">

<h3>Search Products</h3>

<input type="text" placeholder="Search product..." style="padding:10px;width:80%;">

</div>



<h3>Available Products</h3>


<div class="product">

<h3>Product Name</h3>

<p>Price: ₦0</p>

<button>Buy Now</button>

</div>



<div class="card">

<h3>My Orders</h3>

<p>No orders yet</p>

</div>



</div>


</body>
</html>
