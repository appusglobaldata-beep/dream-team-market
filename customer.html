<!DOCTYPE html>
<html>
<head>

<title>Dream Team Market - Customer</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:Arial;
margin:0;
background:#f5f5f5;
}

header{
background:#0b7a3d;
color:white;
padding:20px;
text-align:center;
}

.container{
padding:20px;
}

.card{
background:white;
padding:15px;
margin:15px 0;
border-radius:10px;
box-shadow:0 2px 5px #ccc;
}

button{
background:#0b7a3d;
color:white;
border:none;
padding:12px;
border-radius:5px;
width:100%;
font-size:16px;
}

img{
width:100%;
height:180px;
object-fit:cover;
border-radius:10px;
}

</style>

</head>


<body>


<header>

<h2>Dream Team Market</h2>

<p>Customer Dashboard</p>

</header>



<div class="container">


<div class="card">

<img src="image/product.jpg">

<h3>Product Name</h3>

<p>Price: ₦10,000</p>

<button onclick="payNow()">Buy Now</button>

</div>



<div class="card">

<img src="image/product2.jpg">

<h3>Digital Service</h3>

<p>Fast and Secure Service</p>

<button onclick="payNow()">Order Service</button>

</div>


</div>




<script src="https://js.paystack.co/v1/inline.js"></script>


<script>


function payNow(){


let handler = PaystackPop.setup({


key: 'pk_test_e5155a948fb02b41f36d131f41e7d19a22b9ed22',


email: 'customer@email.com',


amount: 1000000,


currency: 'NGN',



callback: function(response){


alert("Payment Successful. Reference: " + response.reference);


window.location.href="payment.html";


},



onClose: function(){


alert("Payment cancelled");


}


});


handler.openIframe();


}


</script>



</body>
</html>
