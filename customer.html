<!DOCTYPE html>
<html>
<head>
<title>Customer - Dream Team Market</title>

<style>
body{
    font-family:Arial;
    margin:0;
    background:#f4f4f4;
}

header{
    background:#0d6efd;
    color:white;
    text-align:center;
    padding:20px;
}

.container{
    padding:20px;
}

.search{
    width:100%;
    padding:12px;
    border-radius:5px;
    border:1px solid #ccc;
}

.product{
    background:white;
    padding:15px;
    margin-top:15px;
    border-radius:10px;
}

.product img{
    width:100%;
    height:180px;
    object-fit:cover;
    border-radius:10px;
}

button{
    background:#0d6efd;
    color:white;
    border:none;
    padding:12px;
    width:100%;
    border-radius:5px;
}
</style>

</head>

<body>

<header>
<h1>Dream Team Market</h1>
<p>Shop Products</p>
</header>


<div class="container">

<input class="search" placeholder="Search products...">


<div class="product">

<img src="https://via.placeholder.com/300">

<h2>Sample Product</h2>

<p>Price: ₦10,000</p>

<button>Buy Now</button>

</div>


</div>

</body>
</html>
