<!DOCTYPE html>
<html>

<head>
<title>Marketplace</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{font-family:Arial;background:#f5f5f5;margin:0;}

header{
background:#0b7a3d;
color:white;
padding:15px;
text-align:center;
}

.container{padding:15px;}

input,select{
width:100%;
padding:10px;
margin:5px 0;
}

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
}

.card{
background:white;
padding:10px;
border-radius:10px;
cursor:pointer;
}

img{
width:100%;
height:120px;
object-fit:cover;
border-radius:10px;
}

h4{margin:5px 0;}
</style>

</head>

<body>

<header>
<h2>Marketplace</h2>
</header>

<div class="container">

<input id="search" placeholder="Search products..." onkeyup="filterProducts()">

<select id="category" onchange="filterProducts()">
<option value="">All Categories</option>
<option>Phones</option>
<option>Fashion</option>
<option>Electronics</option>
</select>

<div class="grid" id="products"></div>

</div>

<script>

let allProducts = JSON.parse(localStorage.getItem("products")) || [];

function displayProducts(list){

let container = document.getElementById("products");

container.innerHTML = "";

list.forEach((product,index)=>{

container.innerHTML += `
<div class="card" onclick="view(${index})">
<img src="${product.images[0]}">
<h4>${product.name}</h4>
<p>₦${product.price}</p>
</div>
`;

});

}

function filterProducts(){

let text = document.getElementById("search").value.toLowerCase();
let cat = document.getElementById("category").value;

let filtered = allProducts.filter(p => {

let matchText = p.name.toLowerCase().includes(text);
let matchCat = cat === "" || p.category === cat;

return matchText && matchCat;

});

displayProducts(filtered);

}

function view(index){
localStorage.setItem("selectedProduct", JSON.stringify(allProducts[index]));
window.location = "product.html";
}

displayProducts(allProducts);

</script>

</body>
</html>
