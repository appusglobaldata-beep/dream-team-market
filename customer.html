<!DOCTYPE html>
<html>
<head>

<title>Marketplace - Dream Team Market</title>

<script src="https://js.paystack.co/v1/inline.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#f5f5f5;
}

header{
background:#008000;
color:white;
padding:25px;
text-align:center;
}

nav{
background:white;
padding:15px;
text-align:center;
}

nav a{
color:#008000;
text-decoration:none;
margin:10px;
font-weight:bold;
}

.container{
padding:25px;
}

.products{
display:flex;
flex-wrap:wrap;
gap:20px;
}

.card{
background:white;
width:280px;
padding:20px;
border-radius:15px;
box-shadow:0 5px 15px #ddd;
}

.card img{
width:100%;
height:200px;
object-fit:cover;
border-radius:10px;
}

button{
background:#008000;
color:white;
border:none;
padding:12px 20px;
border-radius:5px;
cursor:pointer;
}

</style>

</head>


<body>


<header>

<h1>Dream Team Market</h1>

<p>Find your favorite products</p>

</header>


<nav>

<a href="index.html">Home</a>

<a href="vendor.html">Sell Product</a>

</nav>



<div class="container">


<h2>Available Products</h2>


<div class="products" id="products">

</div>


</div>




<script>


function loadProducts(){


let products = JSON.parse(localStorage.getItem("products")) || [];


let output="";


products.forEach(function(p){


output += `

<div class="card">

<img src="${p.image}">

<h3>${p.name}</h3>

<p>Price: ₦${p.price}</p>


<button onclick="buyProduct('${p.name}','${p.price}')">

Buy Now

</button>


</div>

`;


});


document.getElementById("products").innerHTML=output;


}




function buyProduct(name,price){


let orders = JSON.parse(localStorage.getItem("orders")) || [];


orders.push({

product:name,

price:price,

status:"Pending"

});


localStorage.setItem("orders",JSON.stringify(orders));


pay(price);


}




function pay(price){


let handler = PaystackPop.setup({


key:'pk_test_e5155a948fb02b41f36d131f41e7d19a22b9ed22',


email:'customer@email.com',


amount:Number(price)*100,


currency:'NGN',


callback:function(response){

alert("Payment Successful: "+response.reference);

},


onClose:function(){

alert("Payment cancelled");

}


});


handler.openIframe();


}



loadProducts();


</script>


</body>
</html>
