<html>

</div>


</div>



<script src="https://js.paystack.co/v1/inline.js"></script>


<script>

function payNow(){

let handler = PaystackPop.setup({

key:'pk_test_e5155a948fb02b41f36d131f41e7d19a22b9ed22',

amount:1000000,

currency:'NGN',

callback:function(response){

}

});

handler.openIframe();

}
