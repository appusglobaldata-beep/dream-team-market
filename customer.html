<!DOCTYPE html>
<html>
<head>
<title>Customer Dashboard - Dream Team Market</title>

<style>
body{
    font-family:Arial;
    background:#f5f5f5;
    margin:0;
}

header{
    background:#008000;
    color:white;
    padding:20px;
    text-align:center;
}

.box{
    background:white;
    margin:20px;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px #ccc;
}

.product{
    border:1px solid #ddd;
    padding:15px;
    margin:10px 0;
    border-radius:5px;
}

button{
    background:#008000;
    color:white;
    border:none;
    padding:10px 20px;
    border-radius:5px;
}

</style>

</head>

<body>

<header>

<h1>Customer Dashboard</h1>

<p>Dream Team Market</p>

</header>


<div class="box">

<h2>Available Products</h2>


<div id="products">

<div class="product">

<h3>Sample Product</h3>

<p>Price: ₦1000</p>

<button>Buy Now</button>

</div>


</div>


</div>


<div class="box">

<h2>My Orders</h2>

<p>No orders yet.</p>

</div>


</body>
</html>
