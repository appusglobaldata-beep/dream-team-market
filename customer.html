<!DOCTYPE html>
<html>
<head>
<title>Dream Team Market</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f5f5f5;
}

.header{
background:#0b8f4d;
color:white;
padding:20px;
font-size:24px;
}

.container{
padding:20px;
}

input{
width:100%;
padding:15px;
margin-bottom:20px;
border-radius:8px;
border:1px solid #ccc;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.product{
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 2px 8px #ccc;
}

.product img{
width:100%;
height:220px;
object-fit:cover;
border-radius:10px;
}

.price{
color:#0b8f4d;
font-size:20px;
font-weight:bold;
}

button{
background:#0b8f4d;
color:white;
border:0;
padding:12px;
width:100%;
border-radius:5px;
}

</style>

</head>


<body>


<div class="header">
Dream Team Market
</div>


<div class="container">


<input id="search" placeholder="Search products..." onkeyup="searchProducts()">



<div class="grid" id="products"></div>


</div>



<script>


let allProducts=[];



function loadProducts(){


allProducts=JSON.parse(localStorage.getItem("products")) || [];

displayProducts(allProducts);


}



function displayProducts(products){


let output="";


products.forEach(function(p,index){


output+=`

<div class="product">

<img src="${p.image}">

<h3>${p.name}</h3>

<p>${p.description}</p>

<p>Category: ${p.category}</p>

<p class="price">₦${p.price}</p>

<p>Stock: ${p.stock}</p>


<button onclick="buy(${index})">
Buy Now
</button>


</div>

`;

});


document.getElementById("products").innerHTML=output;


}



function searchProducts(){


let text=document.getElementById("search").value.toLowerCase();


let filtered=allProducts.filter(function(p){

return p.name.toLowerCase().includes(text);

});


displayProducts(filtered);


}



function buy(index){


let p=allProducts[index];


localStorage.setItem("buyName",p.name);

localStorage.setItem("buyPrice",p.price);


window.location.href="payment.html";


}



loadProducts();


</script>


</body>
</html>
