<!DOCTYPE html>
<html>

<head>
<title>Marketplace</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{font-family:Arial;background:#f5f5f5;margin:0;}
header{background:#0b7a3d;color:white;padding:15px;text-align:center;}
.container{padding:15px;}
input,select{width:100%;padding:10px;margin:5px 0;}

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
}

.card{
background:white;
padding:10px;
border-radius:10px;
position:relative;
}

img{
width:100%;
height:120px;
object-fit:cover;
border-radius:10px;
}

button{
width:100%;
margin-top:5px;
padding:8px;
background:#0b7a3d;
color:white;
border:none;
}

.heart{
position:absolute;
top:8px;
right:8px;
font-size:20px;
cursor:pointer;
}
</style>

</head>

<body>

<header>
<h2>Marketplace</h2>
<a href="cart.html" style="color:white;">🛒 Cart</a> |
<a href="wishlist.html" style="color:white;">❤️ Wishlist</a> |
<button onclick="logout()">Logout</button>
</header>

<div class="container">

<input id="search" placeholder="Search..." onkeyup="filterProducts()">

<select id="category" onchange="filterProducts()">
<option value="">All</option>
<option>Phones</option>
<option>Fashion</option>
<option>Electronics</option>
</select>

<div class="grid" id="products"></div>

</div>

<script>

let currentUser = localStorage.getItem("currentUser");

if(!currentUser){
window.location = "login.html";
}

let allProducts = JSON.parse(localStorage.getItem("products")) || [];
let currentList = [...allProducts];

function getWishlist(){
return JSON.parse(localStorage.getItem("wishlist_" + currentUser)) || [];
}

function isSaved(product){
let wishlist = getWishlist();
return wishlist.some(p => p.name === product.name && p.price === product.price);
}

function toggleWishlist(index){

let wishlist = getWishlist();
let product = currentList[index];

let exists = wishlist.findIndex(p => p.name === product.name && p.price === product.price);

if(exists > -1){
wishlist.splice(exists,1);
}else{
wishlist.push(product);
}

localStorage.setItem("wishlist_" + currentUser, JSON.stringify(wishlist));

displayProducts(currentList);
}

function displayProducts(list){

currentList = list;

let container = document.getElementById("products");
container.innerHTML = "";

list.forEach((product,index)=>{

let saved = isSaved(product) ? "❤️" : "🤍";

container.innerHTML += `
<div class="card">

<div class="heart" onclick="toggleWishlist(${index})">${saved}</div>

<img src="${product.images[0]}">

<h4>${product.name}</h4>
<p>₦${product.price}</p>

<button onclick="view(${index})">View</button>
<button onclick="addToCart(${index})">Add to Cart</button>

</div>
`;

});

}

function filterProducts(){

let text = search.value.toLowerCase();
let cat = category.value;

let filtered = allProducts.filter(p => {
return p.name.toLowerCase().includes(text) &&
(cat === "" || p.category === cat);
});

displayProducts(filtered);

}

function view(index){
localStorage.setItem("selectedProduct", JSON.stringify(currentList[index]));
window.location = "product.html";
}

function addToCart(index){

let cart = JSON.parse(localStorage.getItem("cart_" + currentUser)) || [];

cart.push(currentList[index]);

localStorage.setItem("cart_" + currentUser, JSON.stringify(cart));

alert("Added to cart");

}

function logout(){
localStorage.removeItem("currentUser");
window.location = "login.html";
}

displayProducts(allProducts);

</script>

</body>
</html>
