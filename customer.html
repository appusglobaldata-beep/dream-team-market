<!DOCTYPE html>
<html>

<head>

<title>Dream Team Market - Customer</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<style>

body{
font-family:Arial;
margin:0;
background:#f5f5f5;
}

header{
background:#0b7a3d;
color:white;
padding:20px;
text-align:center;
}

.container{
padding:20px;
}

.product{

background:white;
padding:20px;
margin-bottom:15px;
border-radius:10px;
box-shadow:0 2px 5px #ccc;

}


button{

background:#0b7a3d;
color:white;
border:none;
padding:12px;
width:100%;
border-radius:5px;

}

</style>

</head>


<body>


<header>

<h2>Dream Team Market</h2>

<p>Online Marketplace</p>

</header>



<div class="container" id="products">


</div>




<script>


let products = JSON.parse(localStorage.getItem("products")) || [];



let box = document.getElementById("products");



if(products.length === 0){


box.innerHTML = "<h3>No Products Available</h3>";


}



products.forEach(function(product){



box.innerHTML += `


<div class="product">


<h3>${product.name}</h3>


<p>Price: ₦${product.price}</p>


<p>${product.description}</p>



<button onclick="buyProduct()">

Buy Now

</button>



</div>


`;



});




function buyProduct(){

window.location.href="payment.html";

}


</script>



</body>

</html>
