<!DOCTYPE html>
<html>
<head>
<title>Register - Dream Team Market</title>

<style>
body{
    font-family:Arial;
    background:#f4f4f4;
}

.box{
    width:90%;
    max-width:400px;
    background:white;
    margin:40px auto;
    padding:25px;
    border-radius:10px;
}

input, select{
    width:100%;
    padding:12px;
    margin:10px 0;
}

button{
    width:100%;
    padding:12px;
    background:#0d6efd;
    color:white;
    border:none;
    border-radius:5px;
}

a{
    color:#0d6efd;
    text-decoration:none;
}
</style>

</head>

<body>

<div class="box">

<h2>Create Account</h2>

<input type="text" placeholder="Full Name">

<input type="email" placeholder="Email Address">

<input type="password" placeholder="Password">


<select>
<option>Select Account Type</option>
<option>Customer</option>
<option>Vendor</option>
</select>


<button>Create Account</button>


<p>
Already have an account?
<a href="login.html">Login</a>
</p>


</div>

</body>
</html>
