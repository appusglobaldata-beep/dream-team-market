<script>

function register(){


let name = document.querySelector('input[placeholder="Full Name"]').value;

let email = document.querySelector('input[placeholder="Email"]').value;

let password = document.querySelector('input[placeholder="Password"]').value;

let type = document.querySelector('select').value;



if(name=="" || email=="" || password=="" || type=="Select Account Type"){

alert("Please fill all details");

return;

}



let user = {

name:name,

email:email,

password:password,

type:type

};



localStorage.setItem("user", JSON.stringify(user));



alert("Account Created Successfully!");



window.location.href="login.html";


}


</script>
