<!DOCTYPE html>
<html>

<head>

<title>Dream Team Market - Cart</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<style>

body{
font-family:Arial;
margin:0;
background:#f5f5f5;
padding-bottom:70px;
}

header{
background:#0b7a3d;
color:white;
padding:20px;
text-align:center;
}

.container{
padding:20px;
}

.item{

background:white;
padding:15px;
margin-bottom:15px;
border-radius:10px;
box-shadow:0 2px 5px #ccc;

}

button{

background:#0b7a3d;
color:white;
border:none;
padding:12px;
width:100%;
border-radius:5px;

}


.bottom-menu{

position:fixed;
bottom:0;
left:0;
width:100%;
background:#0b7a3d;
display:flex;
justify-content:space-around;
padding:10px 0;

}


.bottom-menu a{

color:white;
text-decoration:none;
text-align:center;

}

</style>


</head>


<body>


<header>

<h2>Dream Team Market</h2>

<p>My Cart</p>

</header>



<div class="container">


<div id="cartItems"></div>


<h3 id="total"></h3>


<button onclick="checkout()">

Checkout

</button>



</div>




<div class="bottom-menu">


<a href="index.html">🏠<br>Home</a>

<a href="customer.html">🛒<br>Shop</a>

<a href="cart.html">🛍️<br>Cart</a>

<a href="profile.html">👤<br>Profile</a>


</div>





<script>


let cart = JSON.parse(localStorage.getItem("cart")) || [];


let box=document.getElementById("cartItems");


let total=0;



if(cart.length==0){

box.innerHTML="<h3>Your cart is empty</h3>";

}



cart.forEach(function(item){


total += Number(item.price);



box.innerHTML += `


<div class="item">

<h3>${item.name}</h3>

<p>Price: ₦${item.price}</p>

</div>


`;



});



document.getElementById("total").innerHTML="Total: ₦"+total;



function checkout(){

window.location.href="payment.html";

}


</script>


</body>

</html>
