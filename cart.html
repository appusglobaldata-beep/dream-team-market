<!DOCTYPE html>
<html>

<head>
<title>Cart</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{font-family:Arial;background:#f5f5f5;margin:0;}
header{background:#0b7a3d;color:white;padding:15px;text-align:center;}
.container{padding:15px;}

.item{
background:white;
padding:10px;
margin-bottom:10px;
border-radius:10px;
}

img{
width:100%;
height:120px;
object-fit:cover;
border-radius:10px;
}

button{
width:100%;
padding:8px;
margin-top:5px;
background:red;
color:white;
border:none;
}
</style>

</head>

<body>

<header>
<h2>Your Cart</h2>
<a href="customer.html" style="color:white;">← Back</a>
</header>

<div class="container" id="cart"></div>

<div class="container" id="total"></div>

<div class="container">
<a href="checkout.html">
<button style="background:#0b7a3d;">Proceed to Checkout</button>
</a>
</div>

<script>

let currentUser = localStorage.getItem("currentUser");

if(!currentUser){
window.location = "login.html";
}

let cart = JSON.parse(localStorage.getItem("cart_" + currentUser)) || [];

function render(){

let box = document.getElementById("cart");
let total = 0;

box.innerHTML = "";

cart.forEach((item,index)=>{

total += Number(item.price);

box.innerHTML += `
<div class="item">
<img src="${item.images[0]}">
<h4>${item.name}</h4>
<p>₦${item.price}</p>
<button onclick="removeItem(${index})">Remove</button>
</div>
`;

});

document.getElementById("total").innerHTML = "<b>Total: ₦" + total + "</b>";

}

function removeItem(index){

cart.splice(index,1);

localStorage.setItem("cart_" + currentUser, JSON.stringify(cart));

render();

}

render();

</script>

</body>
</html>
