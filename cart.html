<!DOCTYPE html>
<html>

<head>

<title>Dream Team Market - Chat</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:Arial;
margin:0;
background:#f5f5f5;
}

header{
background:#0b7a3d;
color:white;
padding:20px;
text-align:center;
}

.chat-box{

background:white;
margin:20px;
padding:15px;
height:350px;
overflow:auto;
border-radius:10px;

}

.message{

background:#eee;
padding:10px;
margin:10px 0;
border-radius:5px;

}

input{

width:75%;
padding:12px;

}

button{

width:20%;
padding:12px;
background:#0b7a3d;
color:white;
border:none;

}

</style>

</head>


<body>


<header>

<h2>Dream Team Market</h2>

<p>Chat With Vendor</p>

</header>




<div class="chat-box" id="chat">

</div>




<div style="padding:20px;">

<input id="message" placeholder="Write message">

<button onclick="sendMessage()">

Send

</button>

</div>




<script>


let messages = JSON.parse(localStorage.getItem("messages")) || [];

let chat=document.getElementById("chat");



function showMessages(){


chat.innerHTML="";


messages.forEach(function(msg){


chat.innerHTML += `

<div class="message">

${msg}

</div>

`;

});


}



showMessages();





function sendMessage(){


let text=document.getElementById("message").value;


if(text=="") return;



messages.push(text);



localStorage.setItem("messages",JSON.stringify(messages));


document.getElementById("message").value="";


showMessages();



}



</script>


</body>

</html>
