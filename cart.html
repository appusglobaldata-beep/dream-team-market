<!DOCTYPE html>
<html>

<head>

<title>Dream Team Market - Cart</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:Arial;
margin:0;
background:#f5f5f5;
padding-bottom:70px;
}

header{
background:#0b7a3d;
color:white;
padding:20px;
text-align:center;
}

.container{
padding:20px;
}

.item{
background:white;
padding:15px;
margin-bottom:15px;
border-radius:10px;
box-shadow:0 2px 5px #ccc;
}

button{
background:#0b7a3d;
color:white;
border:none;
padding:12px;
width:100%;
border-radius:5px;
margin-top:10px;
}

.total{
font-size:18px;
font-weight:bold;
margin-top:10px;
}

.bottom-menu{
position:fixed;
bottom:0;
left:0;
width:100%;
background:#0b7a3d;
display:flex;
justify-content:space-around;
padding:10px;
}

.bottom-menu a{
color:white;
text-decoration:none;
text-align:center;
font-size:13px;
position:relative;
}

#badge{
position:absolute;
top:-5px;
right:8px;
background:red;
color:white;
border-radius:50%;
padding:3px 6px;
font-size:10px;
}

</style>

</head>


<body>


<header>

<h2>Dream Team Market</h2>

<p>Your Cart</p>

</header>



<div class="container">

<div id="cart"></div>

<p class="total" id="total"></p>

<button onclick="checkout()">Checkout</button>

</div>



<div class="bottom-menu">

<a href="index.html">🏠<br>Home</a>

<a href="customer.html">🛒<br>Shop</a>

<a href="cart.html">🛍️<br>Cart</a>

<a href="notifications.html">
🔔<br>Alerts
<span id="badge">0</span>
</a>

</div>



<script>


// ✅ NOTIFICATION FUNCTION
function addNotification(text) {
  let notifications = JSON.parse(localStorage.getItem("notifications")) || [];
  notifications.push(text);
  localStorage.setItem("notifications", JSON.stringify(notifications));
}


// ✅ UPDATE BADGE
function updateBadge(){
  let notifications = JSON.parse(localStorage.getItem("notifications")) || [];
  let badge = document.getElementById("badge");
  if(badge){
    badge.innerText = notifications.length;
  }
}

updateBadge();


// LOAD CART
let cart = JSON.parse(localStorage.getItem("cart")) || [];

let box = document.getElementById("cart");

let total = 0;


cart.forEach(function(item){

total += Number(item.price);

box.innerHTML += `

<div class="item">

<h3>${item.name}</h3>

<p>₦${item.price}</p>

</div>

`;

});


document.getElementById("total").innerText = "Total: ₦" + total;



// CHECKOUT
function checkout(){

if(cart.length == 0){
alert("Cart is empty");
return;
}


// SAVE ORDERS
let orders = JSON.parse(localStorage.getItem("orders")) || [];

cart.forEach(function(item){

orders.push({
name:item.name,
price:item.price,
status:"Pending"
});

});


localStorage.setItem("orders", JSON.stringify(orders));


// ✅ ADD NOTIFICATION
addNotification("🛍️ New order placed successfully");


// CLEAR CART
localStorage.removeItem("cart");


alert("Order Successful!");


window.location.href="notifications.html";

}


</script>


</body>

</html>
