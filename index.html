<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dream Team</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: white;
}

header {
  background: #020617;
  padding: 15px;
  text-align: center;
  font-size: 24px;
  font-weight: bold;
}

.container {
  max-width: 400px;
  margin: auto;
  padding: 20px;
}

.card {
  background: #1e293b;
  padding: 20px;
  border-radius: 10px;
  margin-top: 20px;
}

input {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
  border: none;
  border-radius: 5px;
}

button {
  width: 100%;
  padding: 10px;
  background: #3b82f6;
  color: white;
  border: none;
  border-radius: 5px;
  cursor: pointer;
}

button:hover {
  background: #2563eb;
}

.link {
  text-align: center;
  margin-top: 10px;
  cursor: pointer;
  color: #60a5fa;
}

.hidden {
  display: none;
}
</style>
</head>

<body>

<header>Dream Team</header>

<div class="container">

  <!-- HOME -->
  <div id="home" class="card">
    <h2>Welcome to Dream Team</h2>
    <button onclick="showPage('loginPage')">Login</button>
    <button onclick="showPage('registerPage')">Register</button>
  </div>

  <!-- REGISTER -->
  <div id="registerPage" class="card hidden">
    <h2>Register</h2>
    <input id="regName" placeholder="Full Name">
    <input id="regEmail" placeholder="Email">
    <input id="regPass" type="password" placeholder="Password">
    <button onclick="register()">Register</button>
    <div class="link" onclick="showPage('loginPage')">Already have account? Login</div>
  </div>

  <!-- LOGIN -->
  <div id="loginPage" class="card hidden">
    <h2>Login</h2>
    <input id="loginEmail" placeholder="Email">
    <input id="loginPass" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <div class="link" onclick="showPage('registerPage')">No account? Register</div>
  </div>

  <!-- DASHBOARD -->
  <div id="dashboard" class="card hidden">
    <h2 id="userInfo">Welcome</h2>
    <button onclick="logout()">Logout</button>
  </div>

</div>

<script>
// SWITCH PAGES
function showPage(pageId) {
  let pages = ["home", "loginPage", "registerPage", "dashboard"];
  pages.forEach(p => {
    document.getElementById(p).classList.add("hidden");
  });
  document.getElementById(pageId).classList.remove("hidden");
}

// REGISTER
function register() {
  let name = document.getElementById("regName").value;
  let email = document.getElementById("regEmail").value;
  let pass = document.getElementById("regPass").value;

  if (!name || !email || !pass) {
    alert("Fill all fields");
    return;
  }

  let user = { name, email, pass };
  localStorage.setItem("user", JSON.stringify(user));

  alert("Registered successfully!");
  showPage("loginPage");
}

// LOGIN
function login() {
  let email = document.getElementById("loginEmail").value;
  let pass = document.getElementById("loginPass").value;

  let user = JSON.parse(localStorage.getItem("user"));

  if (!user) {
    alert("No user found");
    return;
  }

  if (email === user.email && pass === user.pass) {
    document.getElementById("userInfo").innerText = "Welcome, " + user.name;
    showPage("dashboard");
  } else {
    alert("Wrong email or password");
  }
}

// LOGOUT
function logout() {
  showPage("home");
}
</script>

</body>
</html>
