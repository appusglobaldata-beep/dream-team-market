<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dream Team Market</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #ffffff;
  color: #333;
}

/* NAV */
nav {
  background: #ffffff;
  border-bottom: 1px solid #ddd;
  padding: 10px;
  display: flex;
  justify-content: center;
  gap: 10px;
}

nav button {
  padding: 10px 15px;
  border: none;
  background: #eee;
  cursor: pointer;
}

nav button:hover {
  background: #007bff;
  color: white;
}

/* PAGE */
.page {
  display: none;
  padding: 20px;
  text-align: center;
}

#home {
  display: block;
}

/* HERO */
.hero {
  padding: 50px 20px;
  background: #f0f4ff;
}

.hero h1 {
  font-size: 28px;
}

.hero button {
  padding: 10px 20px;
  margin-top: 10px;
  background: #007bff;
  color: white;
  border: none;
  cursor: pointer;
}

/* FORM */
.form-box {
  max-width: 300px;
  margin: auto;
}

input {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
  border: 1px solid #ccc;
}

.btn {
  width: 100%;
  padding: 10px;
  background: #007bff;
  color: white;
  border: none;
  cursor: pointer;
}

.msg {
  margin-top: 10px;
  font-size: 14px;
  color: green;
}
</style>
</head>

<body>

<nav>
  <button onclick="showPage('home')">Home</button>
  <button onclick="showPage('login')">Login</button>
  <button onclick="showPage('register')">Register</button>
</nav>

<!-- HOME -->
<div id="home" class="page">
  <div class="hero">
    <h1>Dream Team Market</h1>
    <p>Welcome to your marketplace</p>
    <button onclick="showPage('register')">Start Now</button>
  </div>
</div>

<!-- REGISTER -->
<div id="register" class="page">
  <div class="form-box">
    <h2>Register</h2>
    <input id="regName" placeholder="Name">
    <input id="regEmail" placeholder="Email">
    <input id="regPass" placeholder="Password">
    <button class="btn" onclick="register()">Register</button>
    <div id="regMsg" class="msg"></div>
  </div>
</div>

<!-- LOGIN -->
<div id="login" class="page">
  <div class="form-box">
    <h2>Login</h2>
    <input id="loginEmail" placeholder="Email">
    <input id="loginPass" placeholder="Password">
    <button class="btn" onclick="login()">Login</button>
    <div id="loginMsg" class="msg"></div>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="page">
  <h2>Dashboard</h2>
  <p id="userInfo"></p>
  <button onclick="logout()">Logout</button>
</div>

<script>
function showPage(page) {
  document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
  document.getElementById(page).style.display = 'block';
}

// REGISTER
function register() {
  let name = document.getElementById("regName").value;
  let email = document.getElementById("regEmail").value;
  let pass = document.getElementById("regPass").value;

  if (!name || !email || !pass) {
    document.getElementById("regMsg").innerText = "Fill all fields";
    return;
  }

  let user = {name, email, pass};
  localStorage.setItem("user", JSON.stringify(user));

  document.getElementById("regMsg").innerText = "Registered successfully!";

  // GO TO DASHBOARD
  document.getElementById("userInfo").innerText = "Hello, " + name;
  showPage("dashboard");
}

// LOGIN
function login() {
  let email = document.getElementById("loginEmail").value;
  let pass = document.getElementById("loginPass").value;

  let user = JSON.parse(localStorage.getItem("user"));

  if (!user) {
    document.getElementById("loginMsg").innerText = "No user found";
    return;
  }

  if (email === user.email && pass === user.pass) {
    document.getElementById("userInfo").innerText = "Hello, " + user.name;
    showPage("dashboard");
  } else {
    document.getElementById("loginMsg").innerText = "Wrong details";
  }
}

// LOGOUT
function logout() {
  showPage("home");
}
</script>

</body>
</html>
