<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dream Team</title>

<style>
body {
  margin:0;
  font-family: Arial, sans-serif;
  background:#0f172a;
  color:white;
}

/* NAVBAR */
nav {
  display:flex;
  justify-content:space-between;
  padding:15px;
  background:#020617;
}

nav button {
  background:#2563eb;
  border:none;
  padding:8px 12px;
  color:white;
  cursor:pointer;
}

/* PAGES */
.page { display:none; padding:20px; }
.active { display:block; }

/* FORM */
input {
  display:block;
  margin:10px 0;
  padding:10px;
  width:100%;
}

button {
  padding:10px;
  margin-top:10px;
}

/* PRODUCTS */
.product {
  background:#1e293b;
  padding:10px;
  margin:10px 0;
}

</style>
</head>

<body>

<nav>
  <h2>Dream Team</h2>
  <div>
    <button onclick="showPage('home')">Home</button>
    <button onclick="showPage('login')">Login</button>
    <button onclick="showPage('register')">Register</button>
    <button onclick="showPage('cart')">Cart</button>
  </div>
</nav>

<!-- HOME -->
<div id="home" class="page active">
  <h1>Welcome to Dream Team</h1>
  <p>Professional Marketplace</p>

  <div id="products"></div>
</div>

<!-- LOGIN -->
<div id="login" class="page">
  <h2>Login</h2>
  <input id="loginEmail" placeholder="Email">
  <input id="loginPass" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
</div>

<!-- REGISTER -->
<div id="register" class="page">
  <h2>Register</h2>
  <input id="regName" placeholder="Name">
  <input id="regEmail" placeholder="Email">
  <input id="regPass" type="password" placeholder="Password">

  <select id="role">
    <option value="customer">Customer</option>
    <option value="vendor">Vendor</option>
  </select>

  <button onclick="register()">Register</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="page">
  <h2 id="userInfo"></h2>
  <p id="roleInfo"></p>

  <div id="vendorArea" style="display:none;">
    <h3>Add Product</h3>
    <input id="prodName" placeholder="Product name">
    <button onclick="addProduct()">Add</button>
  </div>
</div>

<!-- CART -->
<div id="cart" class="page">
  <h2>Cart</h2>
  <div id="cartItems"></div>
</div>

<script>

// NAVIGATION
function showPage(id){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

// REGISTER
function register(){
  let user = {
    name: regName.value,
    email: regEmail.value,
    pass: regPass.value,
    role: role.value
  };

  localStorage.setItem("user", JSON.stringify(user));
  alert("Registered!");

  showPage("login");
}

// LOGIN
function login(){
  let user = JSON.parse(localStorage.getItem("user"));

  if(!user){
    alert("No user");
    return;
  }

  if(loginEmail.value === user.email && loginPass.value === user.pass){
    alert("Login success");

    userInfo.innerText = "Welcome " + user.name;
    roleInfo.innerText = "Role: " + user.role;

    if(user.role === "vendor"){
      vendorArea.style.display = "block";
    }

    showPage("dashboard");
  } else {
    alert("Wrong details");
  }
}

// PRODUCTS
let products = JSON.parse(localStorage.getItem("products")) || [];

function addProduct(){
  let p = prodName.value;
  if(!p) return;

  products.push(p);
  localStorage.setItem("products", JSON.stringify(products));
  renderProducts();
}

function renderProducts(){
  let container = document.getElementById("products");
  container.innerHTML = "";

  products.forEach((p,i)=>{
    container.innerHTML += `
      <div class="product">
        <h3>${p}</h3>
        <button onclick="addToCart('${p}')">Add to Cart</button>
      </div>
    `;
  });
}

// CART
let cart = JSON.parse(localStorage.getItem("cart")) || [];

function addToCart(item){
  cart.push(item);
  localStorage.setItem("cart", JSON.stringify(cart));
  alert("Added to cart");
}

function renderCart(){
  let c = document.getElementById("cartItems");
  c.innerHTML = "";

  cart.forEach(i=>{
    c.innerHTML += `<p>${i}</p>`;
  });
}

// LOAD
renderProducts();
renderCart();

</script>

</body>
</html>
