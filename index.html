<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dream Team Market</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background: #f4f6f9;
    }

    /* NAVBAR */
    nav {
      background: #111;
      padding: 15px;
      display: flex;
      justify-content: center;
      gap: 20px;
    }

    nav button {
      background: transparent;
      border: 2px solid #fff;
      color: white;
      padding: 10px 20px;
      border-radius: 25px;
      cursor: pointer;
      transition: 0.3s;
    }

    nav button:hover {
      background: #ff9800;
      border-color: #ff9800;
    }

    /* PAGE */
    .page {
      display: none;
    }

    #home {
      display: block;
    }

    /* HERO */
    .hero {
      background: linear-gradient(135deg, #111, #444);
      color: white;
      text-align: center;
      padding: 80px 20px;
    }

    .hero h1 {
      font-size: 42px;
      margin-bottom: 10px;
    }

    .hero p {
      font-size: 18px;
      margin-bottom: 20px;
    }

    .hero button {
      padding: 12px 25px;
      border: none;
      background: #ff9800;
      color: white;
      border-radius: 25px;
      cursor: pointer;
    }

    /* FEATURES */
    .features {
      padding: 50px 20px;
      text-align: center;
    }

    .features h2 {
      margin-bottom: 30px;
    }

    .cards {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
    }

    .card {
      background: white;
      padding: 20px;
      width: 250px;
      border-radius: 10px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    /* AUTH FORMS */
    .auth {
      display: flex;
      justify-content: center;
      padding: 60px 20px;
    }

    .form-box {
      background: white;
      padding: 30px;
      border-radius: 12px;
      width: 300px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
      text-align: center;
    }

    .form-box h2 {
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button.submit {
      width: 100%;
      padding: 12px;
      background: #111;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 10px;
    }

    button.submit:hover {
      background: #ff9800;
    }

  </style>
</head>

<body>

<!-- NAVBAR -->
<nav>
  <button onclick="showPage('home')">Home</button>
  <button onclick="showPage('login')">Login</button>
  <button onclick="showPage('register')">Register</button>
</nav>

<!-- HOME -->
<div id="home" class="page">

  <div class="hero">
    <h1>Dream Team Market</h1>
    <p>Buy and sell anything, anytime 🚀</p>
    <button onclick="showPage('register')">Get Started</button>
  </div>

  <div class="features">
    <h2>Why Choose Us</h2>

    <div class="cards">
      <div class="card">
        <h3>🛒 Easy Shopping</h3>
        <p>Browse and buy products easily</p>
      </div>

      <div class="card">
        <h3>🔒 Secure</h3>
        <p>Your data is protected</p>
      </div>

      <div class="card">
        <h3>⚡ Fast Delivery</h3>
        <p>Quick and reliable service</p>
      </div>
    </div>
  </div>

</div>

<!-- LOGIN -->
<div id="login" class="page">
  <div class="auth">
    <div class="form-box">
      <h2>Login</h2>
      <input type="email" placeholder="Email">
      <input type="password" placeholder="Password">
      <button class="submit">Login</button>
    </div>
  </div>
</div>

<!-- REGISTER -->
<div id="register" class="page">
  <div class="auth">
    <div class="form-box">
      <h2>Create Account</h2>
      <input type="text" placeholder="Name">
      <input type="email" placeholder="Email">
      <input type="password" placeholder="Password">
      <button class="submit">Register</button>
    </div>
  </div>
</div>

<!-- SCRIPT -->
<script>
function showPage(page) {
  document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
  document.getElementById(page).style.display = 'block';
}
</script>

</body>
</html>
