<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dream Team</title>

<style>
body {margin:0;font-family:Arial;background:#0f172a;color:white;}
nav {display:flex;justify-content:space-between;padding:15px;background:#020617;}
nav button {background:#2563eb;border:none;padding:8px;color:white;cursor:pointer;margin-left:5px;}
.page {display:none;padding:20px;}
.active {display:block;}
input, select {display:block;margin:10px 0;padding:10px;width:100%;}
button {padding:10px;}
.product {background:#1e293b;padding:10px;margin:10px 0;}
</style>
</head>

<body>

<nav>
  <h2>Dream Team</h2>
  <div>
    <button onclick="showPage('home')">Home</button>
    <button onclick="showPage('login')">Login</button>
    <button onclick="showPage('register')">Register</button>
    <button onclick="showPage('cart')">Cart</button>
    <button onclick="logout()">Logout</button>
  </div>
</nav>

<!-- HOME -->
<div id="home" class="page active">
  <h1>Marketplace</h1>
  <div id="products"></div>
</div>

<!-- LOGIN -->
<div id="login" class="page">
  <h2>Login</h2>
  <input id="loginEmail" placeholder="Email">
  <input id="loginPass" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
</div>

<!-- REGISTER -->
<div id="register" class="page">
  <h2>Register</h2>
  <input id="regName" placeholder="Name">
  <input id="regEmail" placeholder="Email">
  <input id="regPass" type="password" placeholder="Password">
  <select id="role">
    <option value="customer">Customer</option>
    <option value="vendor">Vendor</option>
  </select>
  <button onclick="register()">Register</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="page">
  <h2 id="userInfo"></h2>
  <p id="roleInfo"></p>

  <div id="vendorArea" style="display:none;">
    <h3>Add Product</h3>
    <input id="prodName" placeholder="Product name">
    <button onclick="addProduct()">Add Product</button>
  </div>
</div>

<!-- CART -->
<div id="cart" class="page">
  <h2>Your Cart</h2>
  <div id="cartItems"></div>
</div>

<script>

// STATE
let currentUser = JSON.parse(localStorage.getItem("currentUser")) || null;
let products = JSON.parse(localStorage.getItem("products")) || [];
let cart = JSON.parse(localStorage.getItem("cart")) || [];

// NAVIGATION
function showPage(id){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById(id).classList.add("active");

  if(id === "home") renderProducts();
  if(id === "cart") renderCart();
}

// REGISTER
function register(){
  let user = {
    name: regName.value,
    email: regEmail.value,
    pass: regPass.value,
    role: role.value
  };

  localStorage.setItem("user", JSON.stringify(user));
  alert("Registered!");
  showPage("login");
}

// LOGIN
function login(){
  let user = JSON.parse(localStorage.getItem("user"));

  if(!user){
    alert("No user found");
    return;
  }

  if(loginEmail.value === user.email && loginPass.value === user.pass){
    currentUser = user;
    localStorage.setItem("currentUser", JSON.stringify(user));

    userInfo.innerText = "Welcome " + user.name;
    roleInfo.innerText = "Role: " + user.role;

    if(user.role === "vendor"){
      vendorArea.style.display = "block";
    }

    alert("Login success");
    showPage("dashboard");
  } else {
    alert("Wrong login details");
  }
}

// LOGOUT
function logout(){
  localStorage.removeItem("currentUser");
  currentUser = null;
  alert("Logged out");
  showPage("home");
}

// PRODUCTS
function addProduct(){
  if(!currentUser || currentUser.role !== "vendor"){
    alert("Only vendors can add products");
    return;
  }

  let name = prodName.value;
  if(!name) return;

  products.push({name});
  localStorage.setItem("products", JSON.stringify(products));

  prodName.value = "";
  alert("Product added");

  renderProducts();
}

// SHOW PRODUCTS
function renderProducts(){
  let container = document.getElementById("products");
  container.innerHTML = "";

  if(products.length === 0){
    container.innerHTML = "<p>No products yet</p>";
    return;
  }

  products.forEach(p=>{
    container.innerHTML += `
      <div class="product">
        <h3>${p.name}</h3>
        <button onclick="addToCart('${p.name}')">Add to Cart</button>
      </div>
    `;
  });
}

// CART
function addToCart(name){
  cart.push(name);
  localStorage.setItem("cart", JSON.stringify(cart));
  alert("Added to cart");
}

function renderCart(){
  let c = document.getElementById("cartItems");
  c.innerHTML = "";

  if(cart.length === 0){
    c.innerHTML = "<p>Cart is empty</p>";
    return;
  }

  cart.forEach(i=>{
    c.innerHTML += `<p>${i}</p>`;
  });
}

// AUTO LOAD USER SESSION
window.onload = function(){
  if(currentUser){
    userInfo.innerText = "Welcome " + currentUser.name;
    roleInfo.innerText = "Role: " + currentUser.role;

    if(currentUser.role === "vendor"){
      vendorArea.style.display = "block";
    }
  }

  renderProducts();
};

</script>

</body>
</html>
