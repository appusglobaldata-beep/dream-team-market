<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dream Team Market</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
}

nav {
  display:flex;
  justify-content:space-between;
  padding:15px;
  background:#020617;
}

nav button {
  margin-left:5px;
  padding:8px 12px;
  background:#2563eb;
  border:none;
  color:white;
  cursor:pointer;
}

.page {display:none; padding:20px;}
.active {display:block;}

input {
  display:block;
  margin:10px 0;
  padding:10px;
  width:100%;
}

button {padding:10px;}

.products {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:15px;
}

.card {
  background:#1e293b;
  padding:10px;
  border-radius:10px;
}

.card img {
  width:100%;
  height:150px;
  object-fit:cover;
  border-radius:8px;
}
</style>
</head>

<body>

<nav>
  <h2>Dream Team</h2>
  <div>
    <button onclick="showPage('home')">Home</button>
    <button onclick="showPage('login')">Login</button>
    <button onclick="showPage('register')">Register</button>
    <button onclick="showPage('cart')">Cart</button>
    <button onclick="logout()">Logout</button>
  </div>
</nav>

<!-- HOME -->
<div id="home" class="page active">
  <h1>Marketplace</h1>
  <div id="products" class="products"></div>
</div>

<!-- LOGIN -->
<div id="login" class="page">
  <h2>Login</h2>
  <input id="loginEmail" placeholder="Email">
  <input id="loginPass" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
</div>

<!-- REGISTER -->
<div id="register" class="page">
  <h2>Register</h2>
  <input id="regName" placeholder="Name">
  <input id="regEmail" placeholder="Email">
  <input id="regPass" type="password" placeholder="Password">

  <select id="role">
    <option value="customer">Customer</option>
    <option value="vendor">Vendor</option>
  </select>

  <button onclick="register()">Register</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="page">
  <h2 id="userInfo"></h2>
  <p id="roleInfo"></p>

  <div id="vendorArea" style="display:none;">
    <h3>Add Product</h3>

    <input id="prodName" placeholder="Product name">
    <input id="prodPrice" type="number" placeholder="Price">
    <input id="prodImage" type="file">

    <button onclick="addProduct()">Upload Product</button>
  </div>
</div>

<!-- CART -->
<div id="cart" class="page">
  <h2>Cart</h2>
  <div id="cartItems"></div>
</div>

<script>

// STATE
let currentUser = JSON.parse(localStorage.getItem("currentUser")) || null;
let products = JSON.parse(localStorage.getItem("products")) || [];
let cart = JSON.parse(localStorage.getItem("cart")) || [];

// NAV
function showPage(id){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById(id).classList.add("active");

  if(id === "home") renderProducts();
  if(id === "cart") renderCart();
}

// REGISTER
function register(){
  let user = {
    name: regName.value,
    email: regEmail.value,
    pass: regPass.value,
    role: role.value
  };

  localStorage.setItem("user", JSON.stringify(user));
  alert("Registered!");
  showPage("login");
}

// LOGIN
function login(){
  let user = JSON.parse(localStorage.getItem("user"));

  if(loginEmail.value === user.email && loginPass.value === user.pass){

    currentUser = user;
    localStorage.setItem("currentUser", JSON.stringify(user));

    userInfo.innerText = "Welcome " + user.name;
    roleInfo.innerText = "Role: " + user.role;

    if(user.role === "vendor"){
      vendorArea.style.display = "block";
    }

    showPage("dashboard");

  } else {
    alert("Wrong details");
  }
}

// LOGOUT
function logout(){
  localStorage.removeItem("currentUser");
  currentUser = null;
  showPage("home");
}

// ADD PRODUCT WITH IMAGE
function addProduct(){

  let name = prodName.value;
  let price = prodPrice.value;
  let file = prodImage.files[0];

  if(!name || !price || !file){
    alert("Fill all fields");
    return;
  }

  let reader = new FileReader();
  reader.onload = function(){
    let product = {
      name: name,
      price: price,
      image: reader.result
    };

    products.push(product);
    localStorage.setItem("products", JSON.stringify(products));

    renderProducts();
    alert("Product uploaded!");
  };

  reader.readAsDataURL(file);
}

// SHOW PRODUCTS
function renderProducts(){
  let container = document.getElementById("products");
  container.innerHTML = "";

  products.forEach(p=>{
    container.innerHTML += `
      <div class="card">
        <img src="${p.image}">
        <h3>${p.name}</h3>
        <p>$${p.price}</p>
        <button onclick="addToCart('${p.name}', ${p.price})">Add to Cart</button>
      </div>
    `;
  });
}

// CART
function addToCart(name, price){
  cart.push({name, price});
  localStorage.setItem("cart", JSON.stringify(cart));
  alert("Added to cart");
}

function renderCart(){
  let c = document.getElementById("cartItems");
  c.innerHTML = "";

  cart.forEach(i=>{
    c.innerHTML += `<p>${i.name} - $${i.price}</p>`;
  });
}

// LOAD
window.onload = function(){
  renderProducts();
};

</script>

</body>
</html>
