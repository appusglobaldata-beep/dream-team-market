<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dream Team Market</title>

  <style>
    body { font-family: Arial; margin: 0; text-align: center; }
    nav { background: black; padding: 15px; }
    nav button {
      margin: 5px;
      padding: 10px 15px;
      color: white;
      background: transparent;
      border: 1px solid white;
      cursor: pointer;
    }
    .page { display: none; padding: 40px; }
    input { padding: 10px; margin: 5px; width: 200px; }
    button.submit { background: black; color: white; border: none; }
  </style>
</head>

<body>

<nav>
  <button onclick="showPage('home')">Home</button>
  <button onclick="showPage('login')">Login</button>
  <button onclick="showPage('register')">Register</button>
</nav>

<div id="home" class="page">
  <h1>Welcome to Dream Team Market</h1>
</div>

<div id="login" class="page">
  <h2>Login</h2>
  <input type="email" placeholder="Email"><br>
  <input type="password" placeholder="Password"><br>
  <button class="submit">Login</button>
</div>

<div id="register" class="page">
  <h2>Register</h2>
  <input type="text" placeholder="Name"><br>
  <input type="email" placeholder="Email"><br>
  <input type="password" placeholder="Password"><br>
  <button class="submit">Register</button>
</div>

<script>
function showPage(page) {
  document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
  document.getElementById(page).style.display = 'block';
}

// LOAD DEFAULT PAGE
showPage('home');
</script>

</body>
</html>
