<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dream Team Market</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background: #f4f6f9;
    }

    /* NAVBAR */
    nav {
      background: #111;
      padding: 15px;
      display: flex;
      justify-content: center;
      gap: 20px;
    }

    nav button {
      background: transparent;
      border: 2px solid #fff;
      color: white;
      padding: 10px 20px;
      border-radius: 25px;
      cursor: pointer;
      transition: 0.3s;
    }

    nav button:hover {
      background: #ff9800;
      border-color: #ff9800;
    }

    /* PAGES */
    .page {
      display: none;
      padding: 60px 20px;
      text-align: center;
    }

    #home {
      display: block;
    }

    h1, h2 {
      margin-bottom: 20px;
      color: #333;
    }

    /* CARD STYLE */
    .card {
      background: white;
      max-width: 350px;
      margin: auto;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 8px;
      border: 1px solid #ccc;
      outline: none;
    }

    input:focus {
      border-color: #ff9800;
    }

    .btn {
      width: 100%;
      padding: 12px;
      background: #111;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 10px;
      transition: 0.3s;
    }

    .btn:hover {
      background: #ff9800;
    }

    /* HERO */
    .hero {
      padding: 80px 20px;
      background: linear-gradient(to right, #111, #333);
      color: white;
    }

    .hero h1 {
      color: white;
      font-size: 32px;
    }

  </style>
</head>

<body>

<!-- NAVBAR -->
<nav>
  <button onclick="showPage('home')">Home</button>
  <button onclick="showPage('login')">Login</button>
  <button onclick="showPage('register')">Register</button>
</nav>

<!-- HOME -->
<div id="home" class="page">
  <div class="hero">
    <h1>Dream Team Market</h1>
    <p>Your modern online marketplace 🚀</p>
  </div>
</div>

<!-- LOGIN -->
<div id="login" class="page">
  <div class="card">
    <h2>Login</h2>
    <input type="email" placeholder="Email">
    <input type="password" placeholder="Password">
    <button class="btn">Login</button>
  </div>
</div>

<!-- REGISTER -->
<div id="register" class="page">
  <div class="card">
    <h2>Create Account</h2>
    <input type="text" placeholder="Name">
    <input type="email" placeholder="Email">
    <input type="password" placeholder="Password">
    <button class="btn">Register</button>
  </div>
</div>

<!-- SCRIPT -->
<script>
function showPage(page) {
  document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
  document.getElementById(page).style.display = 'block';
}
</script>

</body>
</html>
