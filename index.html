<!DOCTYPE html>
<html>
<head>
<title>Register - Dream Team Market</title>

<style>
body{
    font-family:Arial;
    background:#f5f5f5;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.box{
    background:white;
    padding:30px;
    width:320px;
    border-radius:10px;
    box-shadow:0 0 10px #ccc;
}

input, select{
    width:100%;
    padding:10px;
    margin:10px 0;
}

button{
    width:100%;
    background:#008000;
    color:white;
    padding:12px;
    border:none;
    border-radius:5px;
}

</style>

</head>

<body>

<div class="box">

<h2>Create Account</h2>

<input type="text" placeholder="Full Name">

<input type="email" placeholder="Email Address">

<input type="password" placeholder="Password">


<select id="type">

<option value="">Select Account Type</option>

<option value="customer.html">Customer</option>

<option value="vendor.html">Vendor</option>

</select>


<button onclick="register()">Register</button>


</div>


<script>

function register(){

let account = document.getElementById("type").value;

if(account){

window.location.href = account;

}else{

alert("Please select account type");

}

}

</script>


</body>
</html>
