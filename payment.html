<!DOCTYPE html>
<html>

<head>

<title>Dream Team Market - Payment</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<style>

body{
font-family:Arial;
margin:0;
background:#f5f5f5;
}

header{
background:#0b7a3d;
color:white;
padding:20px;
text-align:center;
}

.box{

background:white;
margin:20px;
padding:20px;
border-radius:10px;
box-shadow:0 2px 5px #ccc;

}

button{

background:#0b7a3d;
color:white;
border:none;
padding:12px;
width:100%;
border-radius:5px;

}

</style>

</head>


<body>


<header>

<h2>Dream Team Market</h2>

<p>Checkout</p>

</header>



<div class="box" id="order">

<h3>Order Summary</h3>

</div>



<button onclick="payNow()">

Pay Now

</button>




<script src="https://js.paystack.co/v1/inline.js"></script>


<script>


let cart = JSON.parse(localStorage.getItem("cart")) || [];


let orderBox=document.getElementById("order");


let total=0;



cart.forEach(function(item){


total += Number(item.price);



orderBox.innerHTML += `

<p>${item.name} - ₦${item.price}</p>

`;



});



orderBox.innerHTML += `

<h3>Total: ₦${total}</h3>

`;





function payNow(){



let handler = PaystackPop.setup({



key:'pk_test_e5155a948fb02b41f36d131f41e7d19a22b9ed22',



email:'customer@email.com',



amount: total * 100,



currency:'NGN',




callback:function(response){



let orders = JSON.parse(localStorage.getItem("orders")) || [];



cart.forEach(function(product){


orders.push({

name:product.name,

price:product.price,

status:"Paid"

});


});



localStorage.setItem("orders",JSON.stringify(orders));



localStorage.removeItem("cart");



alert("Payment Successful Reference: "+response.reference);



window.location.href="orders.html";



},




onClose:function(){


alert("Payment Cancelled");


}



});



handler.openIframe();



}



</script>


</body>

</html>
