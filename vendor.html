<!DOCTYPE html>
<html>
<head>
<title>Vendor Dashboard - Dream Team Market</title>
<style>
body{
    font-family: Arial;
    margin:0;
    background:#f5f5f5;
}
.header{
    background:#0b8f4d;
    color:white;
    padding:20px;
    font-size:24px;
}
.container{
    padding:20px;
}
.card{
    background:white;
    padding:20px;
    margin:15px 0;
    border-radius:10px;
    box-shadow:0 2px 8px #ccc;
}
button{
    background:#0b8f4d;
    color:white;
    border:0;
    padding:12px 20px;
    border-radius:5px;
}
input{
    width:100%;
    padding:12px;
    margin:8px 0;
}
</style>
</head>

<body>

<div class="header">
Dream Team Market - Vendor Dashboard
</div>

<div class="container">

<div class="card">
<h2>Welcome Vendor</h2>
<p>Manage your products and sales here.</p>
</div>

<div class="card">
<h3>Add New Product</h3>

<input type="text" placeholder="Product Name">
<input type="number" placeholder="Price">
<input type="text" placeholder="Product Image URL">

<button>Add Product</button>

</div>

<div class="card">
<h3>Your Store</h3>
<p>Total Products: 0</p>
<p>Total Sales: ₦0</p>
</div>

</div>

</body>
</html>
