<!DOCTYPE html>
<html>

<head>

<title>Dream Team Market - Vendor</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:Arial;
margin:0;
background:#f5f5f5;
}

header{
background:#0b7a3d;
color:white;
padding:20px;
text-align:center;
}

.container{
padding:20px;
}

.card{
background:white;
padding:20px;
margin-bottom:20px;
border-radius:10px;
box-shadow:0 2px 5px #ccc;
}

input, textarea{

width:100%;
padding:12px;
margin:8px 0;
border:1px solid #ccc;
border-radius:5px;

}

button{

width:100%;
padding:12px;
background:#0b7a3d;
color:white;
border:none;
border-radius:5px;
font-size:16px;

}

#preview{

width:100%;
height:180px;
object-fit:cover;
display:none;
border-radius:10px;

}

</style>

</head>


<body>


<header>

<h2>Dream Team Market</h2>

<p>Vendor Dashboard</p>

</header>



<div class="container">


<div class="card">

<h3>Add Product</h3>


<input type="file" id="image" accept="image/*" onchange="showImage(event)">


<img id="preview">



<input type="text" id="name" placeholder="Product Name">


<input type="number" id="price" placeholder="Price">



<textarea id="description" placeholder="Product Description"></textarea>



<button onclick="addProduct()">

Publish Product

</button>


</div>



<div class="card">

<h3>Vendor Account</h3>

<p>Store Name: Dream Store</p>

<p>Total Sales: ₦0</p>

<p>Orders: 0</p>

</div>



</div>



<script>


function showImage(event){

let image=document.getElementById("preview");

image.src=URL.createObjectURL(event.target.files[0]);

image.style.display="block";

}



function addProduct(){

let name=document.getElementById("name").value;

let price=document.getElementById("price").value;


if(name=="" || price==""){

alert("Please fill product details");

return;

}


alert("Product Published Successfully!");

}


</script>



</body>

</html>
