<!DOCTYPE html>
<html>
<head>

<title>Dream Team Market - Vendor</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:Arial;
margin:0;
background:#f5f5f5;
}

header{
background:#0b7a3d;
color:white;
padding:20px;
text-align:center;
}

.container{
padding:20px;
}

.card{
background:white;
padding:20px;
margin-bottom:15px;
border-radius:10px;
box-shadow:0 2px 5px #ccc;
}

input,textarea{
width:100%;
padding:12px;
margin:8px 0;
border:1px solid #ccc;
border-radius:5px;
}

button{
width:100%;
padding:12px;
background:#0b7a3d;
color:white;
border:none;
border-radius:5px;
font-size:16px;
}

.image-box{
height:180px;
border:2px dashed #0b7a3d;
display:flex;
align-items:center;
justify-content:center;
margin-bottom:10px;
border-radius:10px;
}

</style>

</head>


<body>


<header>

<h2>Dream Team Market</h2>

<p>Vendor Dashboard</p>

</header>



<div class="container">


<div class="card">


<h3>Add New Product</h3>


<div class="image-box">

Product Image Space

</div>


<input type="file" accept="image/*">



<input type="text" placeholder="Product Name">



<input type="number" placeholder="Price">



<textarea placeholder="Product Description"></textarea>



<button>

Publish Product

</button>


</div>



<div class="card">


<h3>Vendor Information</h3>


<p>Store Name: Your Store</p>

<p>Total Sales: ₦0</p>

<p>Orders: 0</p>


</div>



</div>



</body>
</html>
