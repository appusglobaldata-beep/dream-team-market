<!DOCTYPE html>
<html>
<head>
<title>Vendor Dashboard - Dream Team Market</title>

<style>
body{
    font-family: Arial;
    background:#f4f4f4;
    margin:0;
}

header{
    background:#0d6efd;
    color:white;
    padding:20px;
    text-align:center;
}

.container{
    padding:20px;
}

.card{
    background:white;
    padding:20px;
    margin-bottom:20px;
    border-radius:10px;
}

input, button{
    width:100%;
    padding:12px;
    margin:8px 0;
}

button{
    background:#0d6efd;
    color:white;
    border:none;
    border-radius:5px;
}

.product{
    background:#eee;
    padding:10px;
    margin:10px 0;
    border-radius:5px;
}
</style>

</head>

<body>

<header>
<h1>Dream Team Market</h1>
<p>Vendor Dashboard</p>
</header>


<div class="container">

<div class="card">
<h2>Add Product</h2>

<input type="text" placeholder="Product Name">

<input type="number" placeholder="Price (NGN)">

<input type="text" placeholder="Product Image Link">

<button>Add Product</button>

</div>


<div class="card">

<h2>Your Products</h2>

<div class="product">
No products added yet.
</div>

</div>


<div class="card">

<h2>Earnings</h2>

<h3>₦0</h3>

</div>


</div>

</body>
</html>
