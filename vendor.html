<!DOCTYPE html>
<html>
<head>
<title>Dream Team Market - Vendor Dashboard</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#f5f5f5;
}

header{
    background:#0b7a3d;
    color:white;
    padding:20px;
    text-align:center;
}

.container{
    padding:20px;
}

.card{
    background:white;
    padding:20px;
    margin-bottom:15px;
    border-radius:10px;
    box-shadow:0 2px 5px #ccc;
}

input{
    width:90%;
    padding:12px;
    margin:8px 0;
}

button{
    background:#0b7a3d;
    color:white;
    border:none;
    padding:12px 25px;
    border-radius:5px;
    cursor:pointer;
}
</style>

</head>

<body>

<header>
<h1>Dream Team Market</h1>
<p>Vendor Dashboard</p>
</header>


<div class="container">

<div class="card">
<h2>Welcome Vendor</h2>
<p>Manage your products, orders and earnings.</p>
</div>


<div class="card">
<h3>Add New Product</h3>

<input type="text" placeholder="Product Name">

<input type="number" placeholder="Product Price">

<input type="text" placeholder="Product Category">

<button>Add Product</button>

</div>


<div class="card">
<h3>My Products</h3>
<p>No products added yet.</p>
</div>


<div class="card">
<h3>Orders</h3>
<p>No orders available.</p>
</div>


<div class="card">
<h3>Total Earnings</h3>
<h2>₦0</h2>
</div>


</div>

</body>
</html>
