<!DOCTYPE html>
<html>
<head>
<title>Vendor Dashboard - Dream Team Market</title>

<style>
body{
font-family:Arial;
margin:0;
background:#f5f5f5;
}

.header{
background:#0b8f4d;
color:white;
padding:20px;
font-size:24px;
}

.container{
padding:20px;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 8px #ccc;
margin-bottom:20px;
}

input,textarea,select{
width:100%;
padding:12px;
margin:8px 0;
}

button{
background:#0b8f4d;
color:white;
border:0;
padding:12px 20px;
border-radius:5px;
}

.product img{
width:100px;
height:100px;
object-fit:cover;
border-radius:10px;
}
</style>

</head>

<body>

<div class="header">
Dream Team Market - Vendor
</div>


<div class="container">


<div class="cards">

<div class="card">
<h3>Total Products</h3>
<h2 id="totalProducts">0</h2>
</div>


<div class="card">
<h3>Total Sales</h3>
<h2>₦0</h2>
</div>


<div class="card">
<h3>Orders</h3>
<h2>0</h2>
</div>


</div>



<div class="card">

<h2>Add Product</h2>

<input id="name" placeholder="Product Name">

<select id="category">
<option>Electronics</option>
<option>Fashion</option>
<option>Food</option>
<option>Services</option>
</select>


<textarea id="description" placeholder="Description"></textarea>

<input id="price" placeholder="Price">

<input id="stock" placeholder="Stock Quantity">

<input type="file" id="image">


<button onclick="addProduct()">Add Product</button>


</div>



<div class="card">

<h2>Your Products</h2>

<div id="products"></div>


</div>


</div>



<script>


function addProduct(){

let file=document.getElementById("image").files[0];


let reader=new FileReader();


reader.onload=function(){


let product={

name:name.value,

category:category.value,

description:description.value,

price:price.value,

stock:stock.value,

image:reader.result

};


let products=JSON.parse(localStorage.getItem("products")) || [];

products.push(product);


localStorage.setItem("products",JSON.stringify(products));


alert("Product Added");

showProducts();


};


reader.readAsDataURL(file);


}



function showProducts(){


let products=JSON.parse(localStorage.getItem("products")) || [];


document.getElementById("totalProducts").innerHTML=products.length;


let output="";


products.forEach(p=>{


output+=`

<div class="product">

<img src="${p.image}">

<h3>${p.name}</h3>

<p>₦${p.price}</p>

<p>Stock: ${p.stock}</p>

</div>

`;


});


document.getElementById("products").innerHTML=output;


}


showProducts();


</script>


</body>
</html>
