<!DOCTYPE html>
<html>
<head>
<title>Vendor Dashboard - Dream Team Market</title>

<style>
body{
    font-family:Arial;
    background:#f4f4f4;
    margin:0;
}

header{
    background:#0d6efd;
    color:white;
    padding:20px;
    text-align:center;
}

.container{
    padding:20px;
}

.box{
    background:white;
    padding:20px;
    border-radius:10px;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    margin:8px 0;
}

button{
    width:100%;
    padding:12px;
    background:#0d6efd;
    color:white;
    border:none;
    border-radius:5px;
}

.product{
    background:#eee;
    padding:15px;
    margin-top:10px;
    border-radius:5px;
}
</style>

</head>

<body>

<header>
<h1>Dream Team Market</h1>
<p>Vendor Dashboard</p>
</header>


<div class="container">


<div class="box">

<h2>Add Product</h2>

<input id="name" placeholder="Product Name">

<input id="price" placeholder="Price">

<input id="image" placeholder="Image Link">


<button onclick="addProduct()">
Add Product
</button>

</div>



<div class="box">

<h2>Your Products</h2>

<div id="products">
No products added.
</div>

</div>


</div>


<script>

function addProduct(){

let name=document.getElementById("name").value;
let price=document.getElementById("price").value;
let image=document.getElementById("image").value;


let product=
`
<div class="product">
<h3>${name}</h3>
<p>Price: ₦${price}</p>
<img src="${image}" width="100%">
</div>
`;


document.getElementById("products").innerHTML=product;

}

</script>


</body>
</html>
