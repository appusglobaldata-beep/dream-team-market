<!DOCTYPE html>
<html>
<head>
<title>Vendor Dashboard - Dream Team Market</title>

<style>
body{
font-family:Arial;
margin:0;
background:#f5f5f5;
}

.header{
background:#0b8f4d;
color:white;
padding:20px;
font-size:24px;
}

.container{
padding:20px;
}

.card{
background:white;
padding:20px;
margin:15px 0;
border-radius:10px;
box-shadow:0 2px 8px #ccc;
}

input,textarea,select{
width:100%;
padding:12px;
margin:8px 0;
border:1px solid #ccc;
border-radius:5px;
}

button{
background:#0b8f4d;
color:white;
border:0;
padding:12px 20px;
border-radius:5px;
}

.product{
border-bottom:1px solid #ddd;
padding:10px;
}

.product img{
width:120px;
height:120px;
object-fit:cover;
border-radius:10px;
}
</style>

</head>

<body>

<div class="header">
Dream Team Market - Vendor
</div>


<div class="container">

<div class="card">

<h2>Add New Product</h2>

<input id="name" placeholder="Product Name">

<select id="category">
<option>Electronics</option>
<option>Fashion</option>
<option>Food</option>
<option>Services</option>
<option>Others</option>
</select>

<textarea id="description" placeholder="Product Description"></textarea>

<input id="price" placeholder="Price">

<input id="stock" placeholder="Stock Quantity">

<input type="file" id="image" accept="image/*">


<button onclick="addProduct()">Add Product</button>

</div>


<div class="card">

<h2>Your Products</h2>

<div id="products"></div>

</div>


</div>



<script>

function addProduct(){

let file=document.getElementById("image").files[0];

if(!file){
alert("Select product image");
return;
}


let reader=new FileReader();


reader.onload=function(){

let product={

name:document.getElementById("name").value,

category:document.getElementById("category").value,

description:document.getElementById("description").value,

price:document.getElementById("price").value,

stock:document.getElementById("stock").value,

image:reader.result

};


let products=JSON.parse(localStorage.getItem("products")) || [];

products.push(product);

localStorage.setItem("products",JSON.stringify(products));


alert("Product Added");

showProducts();

};


reader.readAsDataURL(file);

}



function showProducts(){

let products=JSON.parse(localStorage.getItem("products")) || [];

let output="";


products.forEach(function(p){

output+=`

<div class="product">

<img src="${p.image}">

<h3>${p.name}</h3>

<p>Category: ${p.category}</p>

<p>${p.description}</p>

<p>Price: ₦${p.price}</p>

<p>Stock: ${p.stock}</p>

</div>

`;

});


document.getElementById("products").innerHTML=output;

}


showProducts();

</script>


</body>
</html>
