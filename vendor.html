<!DOCTYPE html>
<html>
<head>
<title>Vendor Dashboard - Dream Team Market</title>

<style>
body{
font-family:Arial;
margin:0;
background:#f5f5f5;
}

.header{
background:#0b8f4d;
color:white;
padding:20px;
font-size:24px;
}

.container{
padding:20px;
}

.card{
background:white;
padding:20px;
margin:15px 0;
border-radius:10px;
}

input{
width:100%;
padding:12px;
margin:8px 0;
}

button{
background:#0b8f4d;
color:white;
border:0;
padding:12px 20px;
border-radius:5px;
}

img{
width:100px;
height:100px;
object-fit:cover;
border-radius:10px;
}
</style>

</head>

<body>

<div class="header">
Dream Team Market - Vendor
</div>

<div class="container">

<div class="card">

<h2>Add Product</h2>

<input id="name" placeholder="Product Name">

<input id="price" placeholder="Price">

<input type="file" id="image" accept="image/*">

<button onclick="addProduct()">Add Product</button>

</div>

<div class="card">

<h3>Your Products</h3>

<div id="products"></div>

</div>

</div>


<script>

function addProduct(){

let file=document.getElementById("image").files[0];

if(!file){
alert("Please select an image");
return;
}

let reader=new FileReader();

reader.onload=function(){

let product={
name:document.getElementById("name").value,
price:document.getElementById("price").value,
image:reader.result
};


let products=JSON.parse(localStorage.getItem("products")) || [];

products.push(product);

localStorage.setItem("products",JSON.stringify(products));

alert("Product Added");

showProducts();

};

reader.readAsDataURL(file);

}


function showProducts(){

let products=JSON.parse(localStorage.getItem("products")) || [];

let output="";

products.forEach(function(p){

output+=`

<div>
<img src="${p.image}">
<p>${p.name}</p>
<p>₦${p.price}</p>
</div>

`;

});

document.getElementById("products").innerHTML=output;

}

showProducts();

</script>

</body>
</html>
