<!DOCTYPE html>
<html>
<head>
<title>Vendor Dashboard - Dream Team Market</title>

<style>
body{
    font-family:Arial;
    background:#f5f5f5;
    margin:0;
}

header{
    background:#008000;
    color:white;
    padding:20px;
    text-align:center;
}

.box{
    background:white;
    margin:20px;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px #ccc;
}

input{
    width:100%;
    padding:10px;
    margin:8px 0;
}

button{
    background:#008000;
    color:white;
    border:none;
    padding:12px;
    border-radius:5px;
}

.product{
    border:1px solid #ddd;
    padding:15px;
    margin:10px 0;
}

</style>

</head>

<body>

<header>

<h1>Vendor Dashboard</h1>

<p>Dream Team Market</p>

</header>


<div class="box">

<h2>Add Product</h2>

<input id="name" placeholder="Product Name">

<input id="price" placeholder="Product Price">

<button onclick="addProduct()">Add Product</button>

</div>



<div class="box">

<h2>Your Products</h2>

<div id="products">

<p>No products added yet.</p>

</div>

</div>


<script>

function addProduct(){

let name=document.getElementById("name").value;

let price=document.getElementById("price").value;


if(name && price){

document.getElementById("products").innerHTML +=

"<div class='product'><h3>"+name+"</h3><p>Price: ₦"+price+"</p></div>";

document.getElementById("name").value="";

document.getElementById("price").value="";


}else{

alert("Enter product details");

}

}

</script>


</body>
</html>
