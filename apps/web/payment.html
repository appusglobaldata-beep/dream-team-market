<!DOCTYPE html>
<html>
<head>
  <title>Payment</title>
  <script src="https://js.paystack.co/v1/inline.js"></script>

  <style>
    body { font-family: Arial; text-align: center; padding: 50px; background: #f4f4f4; }
    .box { background: white; padding: 20px; width: 300px; margin: auto; border-radius: 10px; }
    input { width: 100%; padding: 10px; margin: 10px 0; }
    button { width: 100%; padding: 10px; background: green; color: white; border: none; }
  </style>
</head>

<body>

<div class="box">
  <h2>Make Payment</h2>

  <input type="email" id="email" placeholder="Email">
  <input type="number" id="amount" placeholder="Amount">

  <button onclick="payNow()">Pay Now</button>
</div>

<script>
function payNow() {
  let email = document.getElementById("email").value;
  let amount = document.getElementById("amount").value;

  let handler = PaystackPop.setup({
    key: "pk_test_e5155a948fb02b41f36d131f41e7d19a22b9ed22",
    email: email,
    amount: amount * 100,
    currency: "NGN",

    callback: function(response) {
      alert("Payment successful! Ref: " + response.reference);
    },

    onClose: function() {
      alert("Payment cancelled");
    }
  });

  handler.openIframe();
}
</script>

</body>
</html>
