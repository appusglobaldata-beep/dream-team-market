<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment Dashboard</title>

<script src="https://js.paystack.co/v1/inline.js"></script>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  text-align: center;
  padding: 50px;
}

.container {
  background: #1e293b;
  padding: 30px;
  border-radius: 10px;
  width: 300px;
  margin: auto;
}

input {
  width: 100%;
  padding: 10px;
  margin: 10px 0;
  border: none;
  border-radius: 5px;
}

button {
  background: #22c55e;
  border: none;
  padding: 10px;
  width: 100%;
  color: white;
  font-size: 16px;
  border-radius: 5px;
  cursor: pointer;
}

button:hover {
  background: #16a34a;
}
</style>
</head>

<body>

<div class="container">
  <h2>Pay Now</h2>

  <input type="email" id="email" placeholder="Enter email">
  <input type="number" id="amount" placeholder="Amount (NGN)">

  <button onclick="payNow()">Pay</button>
</div>

<script>
function payNow() {
  let handler = PaystackPop.setup({
    key: "pk_test_e5155a948fb02b41f36d131f41e7d19a22b9ed22",
    email: document.getElementById("email").value,
    amount: document.getElementById("amount").value * 100,
    currency: "NGN",

    callback: function(response) {
      alert("Payment successful! Ref: " + response.reference);
    },

    onClose: function() {
      alert("Transaction cancelled");
    }
  });

  handler.openIframe();
}
</script>

</body>
</html>
