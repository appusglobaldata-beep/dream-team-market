<!DOCTYPE html>
<html>
<head>
<title>Vendor Dashboard - Dream Team Market</title>

<style>
body{
    font-family:Arial;
    background:#f5f5f5;
    margin:0;
}

.header{
    background:#008000;
    color:white;
    padding:20px;
    text-align:center;
}

.container{
    padding:20px;
}

.card{
    background:white;
    padding:20px;
    margin:15px 0;
    border-radius:10px;
    box-shadow:0 0 10px #ccc;
}

button{
    background:#008000;
    color:white;
    border:none;
    padding:10px;
    border-radius:5px;
}

input{
    width:100%;
    padding:10px;
    margin:10px 0;
}

</style>

</head>

<body>

<div class="header">
<h2>Vendor Dashboard</h2>
<p>Dream Team Market</p>
</div>

<div class="container">

<div class="card">
<h3>Add New Product</h3>

<input type="text" placeholder="Product Name">

<input type="number" placeholder="Price">

<input type="text" placeholder="Product Image Link">

<button>Add Product</button>

</div>


<div class="card">
<h3>Your Products</h3>

<p>No products added yet.</p>

</div>


<div class="card">
<h3>Orders</h3>

<p>No orders available.</p>

</div>


</div>

</body>
</html>
