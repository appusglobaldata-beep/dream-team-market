<script>


let product = JSON.parse(localStorage.getItem("selectedProduct"));

let verification = JSON.parse(localStorage.getItem("verification")) || [];

let box=document.getElementById("store");



let verified = false;



if(product){


verification.forEach(function(v){


if(v.store == product.store && v.status == "Verified"){

verified = true;

}


});




box.innerHTML=`


<h2>${product.store}</h2>



${verified ? 

'<span class="badge">✔ Verified Vendor</span>' 

: 

'<span>New Vendor</span>'}



<hr>


<h3>Product</h3>


<p>${product.name}</p>


<p>Category: ${product.category}</p>


<p>Price: ₦${product.price}</p>


<p>${product.description}</p>



`;



}

else{


box.innerHTML="<h3>Store not found</h3>";

}



</script>
