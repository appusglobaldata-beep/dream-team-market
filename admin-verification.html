<!DOCTYPE html>
<html>

<head>

<title>Dream Team Market - Admin Verification</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<style>

body{
font-family:Arial;
margin:0;
background:#f5f5f5;
}

header{
background:#0b7a3d;
color:white;
padding:20px;
text-align:center;
}

.container{
padding:20px;
}

.request{

background:white;
padding:15px;
margin-bottom:15px;
border-radius:10px;
box-shadow:0 2px 5px #ccc;

}

button{

background:#0b7a3d;
color:white;
border:none;
padding:10px;
border-radius:5px;

}

</style>

</head>


<body>


<header>

<h2>Dream Team Market</h2>

<p>Verification Requests</p>

</header>



<div class="container" id="requests">


</div>




<script>


let requests = JSON.parse(localStorage.getItem("verification")) || [];


let box=document.getElementById("requests");



if(requests.length==0){

box.innerHTML="<h3>No Requests</h3>";

}



requests.forEach(function(request,index){


box.innerHTML += `


<div class="request">


<h3>${request.store}</h3>


<p>${request.phone}</p>


<p>${request.info}</p>


<p>Status: ${request.status}</p>



<button onclick="approve(${index})">

Approve Vendor

</button>



</div>


`;



});





function approve(index){


requests[index].status="Verified";


localStorage.setItem("verification",JSON.stringify(requests));


alert("Vendor Verified");


location.reload();


}



</script>



</body>

</html>
