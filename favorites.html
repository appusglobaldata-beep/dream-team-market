<!DOCTYPE html>
<html>

<head>

<title>Dream Team Market - Favorites</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<style>

body{
font-family:Arial;
margin:0;
background:#f5f5f5;
}

header{
background:#0b7a3d;
color:white;
padding:20px;
text-align:center;
}

.box{

background:white;
margin:20px;
padding:20px;
border-radius:10px;
box-shadow:0 2px 5px #ccc;

}

</style>


</head>


<body>


<header>

<h2>Dream Team Market</h2>

<p>My Favorites ❤️</p>

</header>



<div class="box" id="favorite">

<h3>No Favorite Product</h3>

</div>



<script>


let product = JSON.parse(localStorage.getItem("favorite"));

let box=document.getElementById("favorite");



if(product){


box.innerHTML=`


<h3>${product.name}</h3>


<p>Vendor: ${product.store}</p>


<p>Category: ${product.category}</p>


<p>Price: ₦${product.price}</p>


<p>${product.description}</p>


`;



}



</script>



</body>

</html>
