<!DOCTYPE html>
<html>

<head>

<title>Dream Team Market - Product Details</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<style>

body{
font-family:Arial;
margin:0;
background:#f5f5f5;
}

header{
background:#0b7a3d;
color:white;
padding:20px;
text-align:center;
}

.box{

background:white;
margin:20px;
padding:20px;
border-radius:10px;
box-shadow:0 2px 5px #ccc;

}

input,textarea{

width:100%;
padding:12px;
margin:8px 0;

}

button{

background:#0b7a3d;
color:white;
border:none;
padding:12px;
width:100%;
border-radius:5px;

}

.review{

background:#eee;
padding:10px;
margin-top:10px;
border-radius:5px;

}

</style>

</head>


<body>


<header>

<h2>Dream Team Market</h2>

<p>Product Details</p>

</header>




<div class="box" id="details"></div>



<div class="box">


<h3>Rate Product</h3>


<select id="rating">

<option>⭐⭐⭐⭐⭐</option>

<option>⭐⭐⭐⭐</option>

<option>⭐⭐⭐</option>

<option>⭐⭐</option>

<option>⭐</option>

</select>



<textarea id="review" placeholder="Write your review"></textarea>



<button onclick="addReview()">

Submit Review

</button>


</div>



<div class="box">

<h3>Reviews</h3>

<div id="reviews"></div>

</div>





<script>


let product = JSON.parse(localStorage.getItem("selectedProduct"));



document.getElementById("details").innerHTML=`


<h2>${product.name}</h2>

<p>Vendor: ${product.store}</p>

<p>Category: ${product.category}</p>

<p>Price: ₦${product.price}</p>

<p>${product.description}</p>


`;




let reviews = JSON.parse(localStorage.getItem("reviews")) || [];


let reviewBox=document.getElementById("reviews");



reviews.forEach(function(r){


reviewBox.innerHTML += `


<div class="review">

<p>${r.rating}</p>

<p>${r.text}</p>

</div>


`;



});





function addReview(){


let reviews = JSON.parse(localStorage.getItem("reviews")) || [];


reviews.push({

rating:document.getElementById("rating").value,

text:document.getElementById("review").value

});



localStorage.setItem("reviews",JSON.stringify(reviews));



alert("Review Added");


location.reload();


}



</script>


</body>

</html>
