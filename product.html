<!DOCTYPE html>
<html>

<head>

<title>Dream Team Market - Product</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:Arial;
margin:0;
background:#f5f5f5;
}

header{
background:#0b7a3d;
color:white;
padding:20px;
text-align:center;
}

.box{

background:white;
margin:20px;
padding:20px;
border-radius:10px;
box-shadow:0 2px 5px #ccc;

}

button{

background:#0b7a3d;
color:white;
border:none;
padding:12px;
width:100%;
border-radius:5px;

}

</style>

</head>


<body>


<header>

<h2>Dream Team Market</h2>

<p>Product Details</p>

</header>



<div class="box" id="details">


</div>




<script>


let product = JSON.parse(localStorage.getItem("selectedProduct"));



let box=document.getElementById("details");



if(product){


box.innerHTML=`


<h2>${product.name}</h2>


<p>Vendor: ${product.store}</p>


<p>Category: ${product.category}</p>


<p>Price: ₦${product.price}</p>


<p>${product.description}</p>



<button onclick="favorite()">

❤️ Add To Favorites

</button>


`;

}


function favorite(){


localStorage.setItem("favorite",JSON.stringify(product));


alert("Added to Favorites");


}



</script>


</body>

</html>
