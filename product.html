<!DOCTYPE html>
<html>

<head>
<title>Product</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{font-family:Arial;background:#f5f5f5;margin:0;}
header{background:#0b7a3d;color:white;padding:20px;text-align:center;}
.box{background:white;margin:20px;padding:20px;border-radius:10px;text-align:center;}
img{width:100%;border-radius:10px;}
button{margin-top:10px;padding:10px;background:#0b7a3d;color:white;border:none;}
</style>

</head>

<body>

<header>
<h2>Product Details</h2>
</header>

<div class="box" id="details"></div>

<script>

let product = JSON.parse(localStorage.getItem("selectedProduct"));

let box = document.getElementById("details");

let current = 0;

function showImage(){

box.innerHTML = `

<img src="${product.images[current]}">

<h3>${product.name}</h3>
<p>₦${product.price}</p>
<p>${product.description}</p>

<button onclick="prev()">⬅</button>
<button onclick="next()">➡</button>

`;

}

function next(){
current++;
if(current >= product.images.length){
current = 0;
}
showImage();
}

function prev(){
current--;
if(current < 0){
current = product.images.length - 1;
}
showImage();
}

showImage();

</script>

</body>
</html>
