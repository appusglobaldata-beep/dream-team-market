<!DOCTYPE html>
<html>

<head>

<title>Dream Team Market - Profile</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<style>

body{
font-family:Arial;
margin:0;
background:#f5f5f5;
}

header{
background:#0b7a3d;
color:white;
padding:20px;
text-align:center;
}

.box{

background:white;
margin:20px;
padding:20px;
border-radius:10px;
box-shadow:0 2px 5px #ccc;

}

button{

width:100%;
padding:12px;
background:#0b7a3d;
color:white;
border:none;
border-radius:5px;

}

</style>

</head>


<body>


<header>

<h2>Dream Team Market</h2>

<p>My Profile</p>

</header>



<div class="box">


<h3 id="name">User Name</h3>


<p id="type">Account Type</p>


<p>Email: user@email.com</p>



<button onclick="logout()">

Logout

</button>


</div>




<script>


let user = JSON.parse(localStorage.getItem("user"));

if(user){

document.getElementById("name").innerHTML=user.name;

document.getElementById("type").innerHTML=user.type;

}



function logout(){

localStorage.removeItem("user");

window.location.href="login.html";

}


</script>



</body>

</html>
