<!DOCTYPE html>
<html>
<head>
<title>Login - Dream Team Market</title>

<style>
body{
    font-family:Arial;
    background:#f4f4f4;
}

.box{
    width:90%;
    max-width:400px;
    background:white;
    margin:50px auto;
    padding:25px;
    border-radius:10px;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
}

button{
    width:100%;
    padding:12px;
    background:#0d6efd;
    color:white;
    border:none;
    border-radius:5px;
}

a{
    text-decoration:none;
    color:#0d6efd;
}
</style>

</head>

<body>

<div class="box">

<h2>Login</h2>

<input type="email" placeholder="Email">

<input type="password" placeholder="Password">


<button>Login</button>


<p>
Don't have an account?
<a href="register.html">Register</a>
</p>


</div>

</body>
</html>
