<script>

// ===== STATE =====
let currentUser = JSON.parse(localStorage.getItem("currentUser")) || null;
let products = JSON.parse(localStorage.getItem("products")) || [];
let cart = JSON.parse(localStorage.getItem("cart")) || [];

// ===== NAVIGATION =====
function showPage(id){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById(id).classList.add("active");

  if(id === "home") renderProducts();
  if(id === "cart") renderCart();
}

// ===== REGISTER =====
function register(){
  let name = document.getElementById("regName").value.trim();
  let email = document.getElementById("regEmail").value.trim();
  let pass = document.getElementById("regPass").value.trim();
  let roleValue = document.getElementById("role").value;

  if(!name || !email || !pass || !roleValue){
    alert("Fill all fields");
    return;
  }

  let user = {
    name: name,
    email: email,
    pass: pass,
    role: roleValue
  };

  localStorage.setItem("user", JSON.stringify(user));

  alert("Registered successfully!");
  showPage("login");
}

// ===== LOGIN =====
function login(){
  let email = document.getElementById("loginEmail").value.trim();
  let pass = document.getElementById("loginPass").value.trim();

  let user = JSON.parse(localStorage.getItem("user"));

  if(!user){
    alert("No user found");
    return;
  }

  if(email === user.email && pass === user.pass){

    currentUser = user;
    localStorage.setItem("currentUser", JSON.stringify(user));

    document.getElementById("userInfo").innerText = "Welcome " + user.name;
    document.getElementById("roleInfo").innerText = "Role: " + (user.role || "customer");

    if(user.role === "vendor"){
      document.getElementById("vendorArea").style.display = "block";
    } else {
      document.getElementById("vendorArea").style.display = "none";
    }

    alert("Login successful!");
    showPage("dashboard");

  } else {
    alert("Wrong login details");
  }
}

// ===== LOGOUT =====
function logout(){
  localStorage.removeItem("currentUser");
  currentUser = null;
  alert("Logged out");
  showPage("home");
}

// ===== ADD PRODUCT =====
function addProduct(){
  if(!currentUser || currentUser.role !== "vendor"){
    alert("Only vendors can add products");
    return;
  }

  let name = document.getElementById("prodName").value;
  let price = prompt("Enter price:");

  if(!name || !price) return;

  products.push({name, price: Number(price)});
  localStorage.setItem("products", JSON.stringify(products));

  document.getElementById("prodName").value = "";

  alert("Product added!");
  renderProducts();
}

// ===== SHOW PRODUCTS =====
function renderProducts(){
  let container = document.getElementById("products");
  container.innerHTML = "";

  if(products.length === 0){
    container.innerHTML = "<p>No products yet</p>";
    return;
  }

  products.forEach(p=>{
    container.innerHTML += `
      <div class="product">
        <h3>${p.name}</h3>
        <p>$${p.price}</p>
        <button onclick="addToCart('${p.name}', ${p.price})">Add to Cart</button>
      </div>
    `;
  });
}

// ===== CART =====
function addToCart(name, price){
  cart.push({name, price});
  localStorage.setItem("cart", JSON.stringify(cart));
  alert("Added to cart");
}

function renderCart(){
  let c = document.getElementById("cartItems");
  let total = 0;

  c.innerHTML = "";

  if(cart.length === 0){
    c.innerHTML = "<p>Cart is empty</p>";
    document.getElementById("totalPrice").innerText = "";
    return;
  }

  cart.forEach(i=>{
    total += i.price;
    c.innerHTML += `<p>${i.name} - $${i.price}</p>`;
  });

  document.getElementById("totalPrice").innerText = "Total: $" + total;
}

// ===== PAYMENT =====
function payNow(){
  let name = document.getElementById("cardName").value;
  let number = document.getElementById("cardNumber").value;
  let date = document.getElementById("cardDate").value;
  let cvv = document.getElementById("cardCVV").value;

  if(!name || !number || !date || !cvv){
    alert("Fill all payment fields");
    return;
  }

  alert("Payment Successful!");

  cart = [];
  localStorage.setItem("cart", JSON.stringify(cart));

  showPage("home");
}

// ===== AUTO LOAD =====
window.onload = function(){
  let savedUser = JSON.parse(localStorage.getItem("currentUser"));

  if(savedUser){
    currentUser = savedUser;

    document.getElementById("userInfo").innerText = "Welcome " + savedUser.name;
    document.getElementById("roleInfo").innerText = "Role: " + (savedUser.role || "customer");

    if(savedUser.role === "vendor"){
      document.getElementById("vendorArea").style.display = "block";
    }
  }

  renderProducts();
};

</script>
