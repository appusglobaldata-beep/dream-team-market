<!DOCTYPE html>
<html>
<head>
<title>Login - Dream Team Market</title>

<style>
body{
    font-family:Arial;
    background:#f5f5f5;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.box{
    background:white;
    padding:30px;
    width:320px;
    border-radius:10px;
    box-shadow:0 0 10px #ccc;
}

input, select{
    width:100%;
    padding:10px;
    margin:10px 0;
}

button{
    width:100%;
    background:#008000;
    color:white;
    padding:12px;
    border:none;
    border-radius:5px;
}

a{
    color:#008000;
}

</style>

</head>

<body>

<div class="box">

<h2>Login</h2>

<input type="email" placeholder="Email Address">

<input type="password" placeholder="Password">


<select id="account">

<option value="">Login As</option>

<option value="customer.html">Customer</option>

<option value="vendor.html">Vendor</option>

</select>


<button onclick="login()">Login</button>


<p>
Don't have an account?
<a href="register.html">Register</a>
</p>


</div>


<script>

function login(){

let page = document.getElementById("account").value;

if(page){

window.location.href = page;

}else{

alert("Please select account type");

}

}

</script>


</body>
</html>
