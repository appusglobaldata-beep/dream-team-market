<!DOCTYPE html>
<html>
<head>
<title>Login - Dream Team Market</title>
<style>
body{
    font-family: Arial;
    background:#f5f5f5;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.box{
    background:white;
    padding:30px;
    width:300px;
    border-radius:10px;
    box-shadow:0 0 10px #ccc;
}

input{
    width:100%;
    padding:10px;
    margin:10px 0;
}

button{
    width:100%;
    padding:12px;
    background:#008000;
    color:white;
    border:none;
    border-radius:5px;
}

a{
    text-decoration:none;
}
</style>
</head>

<body>

<div class="box">

<h2>Login</h2>

<input type="email" placeholder="Email">

<input type="password" placeholder="Password">

<button>Login</button>

<p>
Don't have an account?
<a href="register.html">Register</a>
</p>

</div>

</body>
</html>
