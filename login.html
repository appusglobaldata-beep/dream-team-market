<!DOCTYPE html>
<html>
<head>

<title>Login - Dream Team Market</title>

<style>

body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#f5f5f5;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}


.box{

    background:white;
    width:350px;
    padding:35px;
    border-radius:15px;
    box-shadow:0 5px 20px #ccc;

}


.logo{

    text-align:center;
    color:#008000;
    font-size:25px;
    font-weight:bold;

}


h2{
    text-align:center;
}



input, select{

    width:100%;
    padding:14px;
    margin:10px 0;
    border:1px solid #ddd;
    border-radius:5px;

}



button{

    width:100%;
    padding:14px;
    background:#008000;
    color:white;
    border:none;
    border-radius:5px;
    font-size:16px;
    cursor:pointer;

}



button:hover{

background:#006600;

}



p{

text-align:center;

}


a{

color:#008000;
text-decoration:none;

}

</style>


</head>


<body>



<div class="box">


<div class="logo">
Dream Team Market
</div>


<h2>Login</h2>



<input type="email" id="email" placeholder="Email Address">



<input type="password" id="password" placeholder="Password">



<select id="accountType">

<option value="">
Login As
</option>

<option value="customer.html">
Customer
</option>


<option value="vendor.html">
Vendor
</option>


</select>



<button onclick="loginUser()">
Login
</button>




<p>
Don't have an account?
<a href="register.html">
Register
</a>
</p>



</div>




<script>


function loginUser(){


let type=document.getElementById("accountType").value;



if(type==""){

alert("Select account type");

return;

}



window.location.href=type;


}


</script>




</body>
</html>
