<!DOCTYPE html>
<html>

<head>

<title>Dream Team Market - Login</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:Arial;
background:#f5f5f5;
margin:0;
}

.box{
background:white;
width:90%;
max-width:400px;
margin:50px auto;
padding:20px;
border-radius:10px;
box-shadow:0 2px 5px #ccc;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:5px;
}

button{
width:100%;
padding:12px;
background:#0b7a3d;
color:white;
border:none;
border-radius:5px;
}

a{
text-decoration:none;
color:#0b7a3d;
}

</style>

</head>


<body>


<div class="box">

<h2>Dream Team Market</h2>

<h3>Login</h3>


<input type="email" placeholder="Email">


<input type="password" placeholder="Password">


<button onclick="login()">

Login

</button>


<p>
Don't have an account?
<a href="register.html">Register</a>
</p>


</div>



<script>

function login(){

alert("Login Successful");

window.location.href="customer.html";

}

</script>


</body>

</html>
