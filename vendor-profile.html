<!DOCTYPE html>
<html>
<head>

<title>Vendor Profile - Dream Team Market</title>

<style>

body{
font-family:Arial;
background:#f5f5f5;
padding:20px;
}

.box{
background:white;
padding:25px;
border-radius:10px;
max-width:500px;
margin:auto;
box-shadow:0 2px 8px #ccc;
}

input{
width:100%;
padding:12px;
margin:10px 0;
}

button{
background:#0b8f4d;
color:white;
border:0;
padding:12px;
width:100%;
border-radius:5px;
}

</style>

</head>


<body>


<div class="box">


<h2>Vendor Store Setup</h2>


<input id="name" placeholder="Store Name">


<input id="phone" placeholder="Phone Number">


<input id="location" placeholder="Store Location">


<label>Upload Store Logo</label>

<input type="file" id="logo" accept="image/*">



<button onclick="saveStore()">
Save Store
</button>



</div>



<script>


function saveStore(){


let file=document.getElementById("logo").files[0];


if(file){


let reader=new FileReader();


reader.onload=function(){


saveData(reader.result);


};


reader.readAsDataURL(file);



}else{


saveData("");

}



}



function saveData(logo){


let store={

name:document.getElementById("name").value,

phone:document.getElementById("phone").value,

location:document.getElementById("location").value,

logo:logo

};


localStorage.setItem("store",JSON.stringify(store));


alert("Store Profile Saved");


window.location.href="store.html";


}


</script>


</body>
</html>
