<!DOCTYPE html>
<html>
<head>

<title>Admin Dashboard - Dream Team Market</title>

<style>

body{
font-family:Arial;
background:#f5f5f5;
margin:0;
}

.header{
background:#0b8f4d;
color:white;
padding:20px;
font-size:25px;
}

.container{
padding:20px;
}

.card{
background:white;
padding:20px;
margin:15px 0;
border-radius:10px;
box-shadow:0 2px 8px #ccc;
}

</style>

</head>


<body>


<div class="header">
Dream Team Market Admin
</div>


<div class="container">


<div class="card">

<h2>Users</h2>

<p id="users">0</p>

</div>



<div class="card">

<h2>Products</h2>

<p id="products">0</p>

</div>



<div class="card">

<h2>Orders</h2>

<p id="orders">0</p>

</div>



<div class="card">

<h2>Platform Sales</h2>

<p id="sales">₦0</p>

</div>



</div>



<script>


let account = localStorage.getItem("account");

let products = JSON.parse(localStorage.getItem("products")) || [];

let orders = JSON.parse(localStorage.getItem("orders")) || [];



document.getElementById("users").innerHTML = account ? "1" : "0";


document.getElementById("products").innerHTML = products.length;


document.getElementById("orders").innerHTML = orders.length;



let total=0;


orders.forEach(function(o){

total += Number(o.price);

});


document.getElementById("sales").innerHTML="₦"+total;


</script>


</body>
</html>
