<!DOCTYPE html>
<html>

<head>

<title>Dream Team Market - Admin</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:Arial;
margin:0;
background:#f5f5f5;
}

header{
background:#0b7a3d;
color:white;
padding:20px;
text-align:center;
}

.container{
padding:20px;
}

.card{
background:white;
padding:20px;
margin-bottom:15px;
border-radius:10px;
box-shadow:0 2px 5px #ccc;
}

</style>

</head>


<body>


<header>

<h2>Dream Team Market</h2>

<p>Admin Dashboard</p>

</header>



<div class="container">


<div class="card">

<h3>Users</h3>

<p id="users">0</p>

</div>



<div class="card">

<h3>Products</h3>

<p id="products">0</p>

</div>



<div class="card">

<h3>Orders</h3>

<p>0</p>

</div>



</div>



<script>


let user = localStorage.getItem("user");

let products = JSON.parse(localStorage.getItem("products")) || [];



document.getElementById("users").innerHTML = user ? "1" : "0";


document.getElementById("products").innerHTML = products.length;



</script>



</body>

</html>
