<!DOCTYPE html>
<html>

<head>
<title>Admin Panel</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{font-family:Arial;background:#f5f5f5;margin:0;}

header{
background:#222;
color:white;
padding:15px;
text-align:center;
}

.container{padding:15px;}

.section{
background:white;
padding:15px;
border-radius:10px;
margin-bottom:15px;
}

.item{
border-bottom:1px solid #ddd;
padding:10px 0;
}

button{
padding:6px 10px;
margin-top:5px;
border:none;
color:white;
cursor:pointer;
}

.delete{background:red;}
.clear{background:#333;}
</style>

</head>

<body>

<header>
<h2>Admin Panel ⚙️</h2>
<a href="customer.html" style="color:white;">← Back</a>
</header>

<div class="container">

<!-- PRODUCTS -->
<div class="section">
<h3>All Products</h3>
<div id="products"></div>
<button class="clear" onclick="clearProducts()">Clear All Products</button>
</div>

<!-- USERS -->
<div class="section">
<h3>All Users</h3>
<div id="users"></div>
<button class="clear" onclick="clearUsers()">Clear All Users</button>
</div>

<!-- ORDERS -->
<div class="section">
<h3>All Orders</h3>
<div id="orders"></div>
<button class="clear" onclick="clearOrders()">Clear All Orders</button>
</div>

</div>

<script>

// PRODUCTS
function loadProducts(){

let products = JSON.parse(localStorage.getItem("products")) || [];

let box = document.getElementById("products");
box.innerHTML = "";

products.forEach((p,i)=>{

box.innerHTML += `
<div class="item">
<b>${p.name}</b> - ₦${p.price}
<br>
<button class="delete" onclick="deleteProduct(${i})">Delete</button>
</div>
`;

});

}

function deleteProduct(i){

let products = JSON.parse(localStorage.getItem("products")) || [];

products.splice(i,1);

localStorage.setItem("products", JSON.stringify(products));

loadProducts();

}

function clearProducts(){
localStorage.removeItem("products");
loadProducts();
}


// USERS
function loadUsers(){

let users = [];

for(let i=0;i<localStorage.length;i++){
let key = localStorage.key(i);

if(key.startsWith("cart_") || key.startsWith("wishlist_") || key.startsWith("orders_")){
let name = key.split("_")[1];
if(!users.includes(name)){
users.push(name);
}
}

}

let box = document.getElementById("users");
box.innerHTML = "";

users.forEach(user=>{

box.innerHTML += `
<div class="item">
${user}
</div>
`;

});

}

function clearUsers(){

let keys = Object.keys(localStorage);

keys.forEach(key=>{
if(key.startsWith("cart_") || key.startsWith("wishlist_") || key.startsWith("orders_")){
localStorage.removeItem(key);
}
});

loadUsers();

}


// ORDERS
function loadOrders(){

let box = document.getElementById("orders");
box.innerHTML = "";

for(let i=0;i<localStorage.length;i++){

let key = localStorage.key(i);

if(key.startsWith("orders_")){

let user = key.split("_")[1];
let orders = JSON.parse(localStorage.getItem(key)) || [];

orders.forEach(order=>{

box.innerHTML += `
<div class="item">
<b>User:</b> ${user}<br>
<b>Total:</b> ₦${order.total}<br>
<b>Payment:</b> ${order.payment}<br>
<b>Date:</b> ${order.date}
</div>
`;

});

}

}

}

function clearOrders(){

let keys = Object.keys(localStorage);

keys.forEach(key=>{
if(key.startsWith("orders_")){
localStorage.removeItem(key);
}
});

loadOrders();

}


// INIT
loadProducts();
loadUsers();
loadOrders();

</script>

</body>
</html>
