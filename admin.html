<!DOCTYPE html>
<html>

<head>
<title>Admin Panel</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{font-family:Arial;background:#f5f5f5;margin:0;}
header{background:#111;color:white;padding:15px;text-align:center;}
.container{padding:15px;}

.section{
background:white;
padding:15px;
border-radius:10px;
margin-bottom:15px;
}

.item{
border-bottom:1px solid #ddd;
padding:10px 0;
}

button{
padding:6px 10px;
margin-top:5px;
border:none;
color:white;
cursor:pointer;
}

.delete{background:red;}
.clear{background:#333;}
.status{background:green;}
.logout{background:orange;margin-top:10px;}
</style>

</head>

<body>

<header>
<h2>Admin Panel ⚙️</h2>
<button class="logout" onclick="logout()">Logout</button>
</header>

<div class="container">

<!-- PRODUCTS -->
<div class="section">
<h3>Products</h3>
<div id="products"></div>
<button class="clear" onclick="clearProducts()">Clear All</button>
</div>

<!-- USERS -->
<div class="section">
<h3>Users</h3>
<div id="users"></div>
<button class="clear" onclick="clearUsers()">Clear All</button>
</div>

<!-- ORDERS -->
<div class="section">
<h3>Orders</h3>
<div id="orders"></div>
<button class="clear" onclick="clearOrders()">Clear All</button>
</div>

</div>

<script>

// 🔐 PROTECT PAGE
if(localStorage.getItem("admin") !== "true"){
window.location = "admin-login.html";
}

// LOGOUT
function logout(){
localStorage.removeItem("admin");
window.location = "admin-login.html";
}


// PRODUCTS
function loadProducts(){

let products = JSON.parse(localStorage.getItem("products")) || [];

let box = document.getElementById("products");
box.innerHTML = "";

products.forEach((p,i)=>{

box.innerHTML += `
<div class="item">
<b>${p.name}</b> - ₦${p.price}
<br>
Vendor: ${p.vendor || "N/A"}
<br>
<button class="delete" onclick="deleteProduct(${i})">Delete</button>
</div>
`;

});

}

function deleteProduct(i){
let products = JSON.parse(localStorage.getItem("products")) || [];
products.splice(i,1);
localStorage.setItem("products", JSON.stringify(products));
loadProducts();
}

function clearProducts(){
localStorage.removeItem("products");
loadProducts();
}


// USERS
function loadUsers(){

let users = [];

for(let i=0;i<localStorage.length;i++){
let key = localStorage.key(i);

if(key.startsWith("orders_")){
let name = key.split("_")[1];
if(!users.includes(name)){
users.push(name);
}
}
}

let box = document.getElementById("users");
box.innerHTML = "";

users.forEach(user=>{
box.innerHTML += `<div class="item">${user}</div>`;
});

}

function clearUsers(){

let keys = Object.keys(localStorage);

keys.forEach(key=>{
if(key.startsWith("orders_") || key.startsWith("cart_")){
localStorage.removeItem(key);
}
});

loadUsers();
}


// ORDERS
function loadOrders(){

let box = document.getElementById("orders");
box.innerHTML = "";

for(let i=0;i<localStorage.length;i++){

let key = localStorage.key(i);

if(key.startsWith("orders_")){

let user = key.split("_")[1];
let orders = JSON.parse(localStorage.getItem(key)) || [];

orders.forEach((o,index)=>{

box.innerHTML += `
<div class="item">
<b>User:</b> ${user}<br>
<b>Total:</b> ₦${o.total}<br>
<b>Payment:</b> ${o.payment}<br>
<b>Status:</b> ${o.status || "Pending"}<br>
<button class="status" onclick="updateStatus('${key}',${index})">Mark Delivered</button>
</div>
`;

});

}

}

}

function updateStatus(key,index){

let orders = JSON.parse(localStorage.getItem(key)) || [];

orders[index].status = "Delivered";

localStorage.setItem(key, JSON.stringify(orders));

loadOrders();

}

function clearOrders(){

let keys = Object.keys(localStorage);

keys.forEach(key=>{
if(key.startsWith("orders_")){
localStorage.removeItem(key);
}
});

loadOrders();

}


// INIT
loadProducts();
loadUsers();
loadOrders();

</script>

</body>
</html>
