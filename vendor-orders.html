<!DOCTYPE html>
<html>

<head>
<title>Dream Team Market - Vendor</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{font-family:Arial;margin:0;background:#f5f5f5;padding-bottom:70px;}
header{background:#0b7a3d;color:white;padding:20px;text-align:center;}
.container{padding:20px;}
.card{background:white;padding:20px;border-radius:10px;box-shadow:0 2px 5px #ccc;}
input,textarea,select{width:100%;padding:12px;margin:8px 0;}
button{width:100%;padding:12px;background:#0b7a3d;color:white;border:none;border-radius:5px;}
</style>
</head>

<body>

<header>
<h2>Dream Team Market</h2>
<p>Add Product</p>
</header>

<div class="container">
<div class="card">

<input id="store" placeholder="Store Name">
<input id="name" placeholder="Product Name">

<select id="category">
<option>Phones</option>
<option>Fashion</option>
<option>Electronics</option>
<option>Services</option>
</select>

<input id="price" placeholder="Price">
<textarea id="description" placeholder="Description"></textarea>

<input type="file" id="image">

<button onclick="addProduct()">Publish Product</button>

</div>
</div>

<script>

function addProduct(){

let products = JSON.parse(localStorage.getItem("products")) || [];

let file = document.getElementById("image").files[0];

let reader = new FileReader();

reader.onload = function(){

products.push({
store:store.value,
name:name.value,
category:category.value,
price:price.value,
description:description.value,
image:reader.result
});

localStorage.setItem("products", JSON.stringify(products));

alert("Product Published!");

};

if(file){
reader.readAsDataURL(file);
}else{
alert("Select an image");
}

}

</script>

</body>
</html>
