<!DOCTYPE html>
<html>

<head>

<title>Dream Team Market - Vendor Orders</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:Arial;
margin:0;
background:#f5f5f5;
}

header{
background:#0b7a3d;
color:white;
padding:20px;
text-align:center;
}

.container{
padding:20px;
}

.order{

background:white;
padding:15px;
margin-bottom:15px;
border-radius:10px;
box-shadow:0 2px 5px #ccc;

}

button{

background:#0b7a3d;
color:white;
border:none;
padding:10px;
border-radius:5px;

}

</style>

</head>


<body>


<header>

<h2>Dream Team Market</h2>

<p>Vendor Orders</p>

</header>



<div class="container" id="orders">

</div>




<script>


let orders = JSON.parse(localStorage.getItem("orders")) || [];


let box = document.getElementById("orders");



if(orders.length == 0){

box.innerHTML="<h3>No Orders Yet</h3>";

}



orders.forEach(function(order,index){


box.innerHTML += `


<div class="order">


<h3>${order.name}</h3>


<p>Price: ₦${order.price}</p>


<p>Status: ${order.status}</p>



<button onclick="completeOrder(${index})">

Complete

</button>


</div>


`;



});





function completeOrder(index){


orders[index].status="Completed";


localStorage.setItem("orders",JSON.stringify(orders));


alert("Order Completed");


location.reload();


}



</script>


</body>

</html>
