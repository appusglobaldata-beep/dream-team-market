<!DOCTYPE html>
<html>
<head>
<title>Vendor Orders - Dream Team Market</title>

<style>
body{
font-family:Arial;
background:#f5f5f5;
padding:20px;
}

.header{
background:#0b8f4d;
color:white;
padding:20px;
font-size:24px;
}

.card{
background:white;
padding:20px;
margin-top:20px;
border-radius:10px;
box-shadow:0 2px 8px #ccc;
}

button{
background:#0b8f4d;
color:white;
border:0;
padding:10px;
border-radius:5px;
}
</style>

</head>

<body>

<div class="header">
Vendor Orders
</div>


<div id="orders"></div>



<script>


function loadOrders(){


let orders=JSON.parse(localStorage.getItem("orders")) || [];


let output="";


if(orders.length==0){

output=`

<div class="card">

<h3>No Orders Yet</h3>

</div>

`;

}else{


orders.forEach(function(order,index){


output+=`

<div class="card">

<h3>${order.product}</h3>

<p>Customer: ${order.customer}</p>

<p>Amount: ₦${order.price}</p>

<p>Status: ${order.status}</p>


<button onclick="completeOrder(${index})">

Mark Completed

</button>


</div>

`;

});


}


document.getElementById("orders").innerHTML=output;


}



function completeOrder(index){

let orders=JSON.parse(localStorage.getItem("orders")) || [];

orders[index].status="Completed";

localStorage.setItem("orders",JSON.stringify(orders));

loadOrders();

}


loadOrders();


</script>


</body>
</html>
