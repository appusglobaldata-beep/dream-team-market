<!DOCTYPE html>
<html>

<head>

<title>Dream Team Market - Orders</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:Arial;
background:#f5f5f5;
margin:0;
}

header{
background:#0b7a3d;
color:white;
padding:20px;
text-align:center;
}

.box{
background:white;
margin:20px;
padding:20px;
border-radius:10px;
box-shadow:0 2px 5px #ccc;
}

</style>

</head>


<body>


<header>

<h2>Dream Team Market</h2>

<p>My Orders</p>

</header>



<div class="box" id="orders">

<h3>No Orders Yet</h3>

</div>



<script>

let orders = JSON.parse(localStorage.getItem("orders")) || [];

let box=document.getElementById("orders");


if(orders.length > 0){

box.innerHTML="";


orders.forEach(function(order){


box.innerHTML += `

<h3>${order.name}</h3>

<p>Price: ₦${order.price}</p>

<p>Status: ${order.status}</p>

<hr>

`;

});


}


</script>


</body>

</html>
