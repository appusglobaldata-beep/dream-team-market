<!DOCTYPE html>
<html>

<head>
<title>My Orders</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{font-family:Arial;background:#f5f5f5;margin:0;}
header{background:#0b7a3d;color:white;padding:15px;text-align:center;}
.container{padding:15px;}

.order{
background:white;
padding:10px;
margin-bottom:10px;
border-radius:10px;
}

img{
width:100%;
height:100px;
object-fit:cover;
border-radius:10px;
margin-top:5px;
}
</style>

</head>

<body>

<header>
<h2>My Orders</h2>
<a href="customer.html" style="color:white;">← Back</a>
</header>

<div class="container" id="orders"></div>

<script>

let currentUser = localStorage.getItem("currentUser");

if(!currentUser){
window.location = "login.html";
}

let orders = JSON.parse(localStorage.getItem("orders_" + currentUser)) || [];

let box = document.getElementById("orders");

if(orders.length === 0){
box.innerHTML = "<p>No orders yet</p>";
}else{

orders.forEach(order => {

box.innerHTML += `
<div class="order">

<h3>Total: ₦${order.total}</h3>
<p>${order.date}</p>
<p>Payment: ${order.payment}</p>

`;

order.items.forEach(item => {

box.innerHTML += `
<img src="${item.images[0]}">
<p>${item.name}</p>
`;

});

box.innerHTML += `</div>`;

});

}

</script>

</body>
</html>
